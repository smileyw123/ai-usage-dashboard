<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, sans-serif;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      border: 1px solid #30363d;
      border-radius: 16px;
      background: #161b22;
      max-width: 320px;
    }
    .emoji { font-size: 56px; margin-bottom: 20px; }
    h1 { color: #58a6ff; font-size: 24px; margin-bottom: 10px; }
    p { color: #8b949e; font-size: 14px; line-height: 1.6; }
    .tag {
      display: inline-block;
      margin-top: 20px;
      padding: 5px 14px;
      background: #238636;
      border-radius: 20px;
      font-size: 12px;
      color: #3fb950;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>Hello, GitHub!</h1>
    <p>Claude가 만들고<br>GH Uploader로 올린 페이지예요.</p>
    <div class="tag">✅ Deployed via Claude</div>
  </div>
</body>
</html>
