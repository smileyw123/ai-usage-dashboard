<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Usage Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--sf:#0f1623;--sf2:#1a2535;--bd:#1e2d45;--ac:#00d4ff;--ac2:#a78bfa;--ac3:#f59e0b;--tx:#e2e8f0;--mt:#64748b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:800;font-size:18px;}.logo span{color:var(--ac);}
.badge{font-size:11px;color:var(--mt);background:var(--sf2);border:1px solid var(--bd);padding:4px 10px;border-radius:20px;}
#app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:28px 24px 80px;}
/* raw table */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.sec-title{font-size:16px;font-weight:800;}.sec-title span{color:var(--ac);}
.sec-desc{font-size:11px;color:var(--mt);margin-top:2px;}
.tbl-ctrl{display:flex;align-items:center;gap:10px;}
.si{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:7px 12px;font-family:'IBM Plex Sans KR',sans-serif;font-size:12px;color:var(--tx);outline:none;width:220px;}
.si:focus{border-color:var(--ac);}
.si::placeholder{color:var(--mt);}
.tw{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.ts{overflow-x:auto;max-height:360px;overflow-y:auto;}
.ts::-webkit-scrollbar{width:4px;height:4px;}
.ts::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
thead{position:sticky;top:0;z-index:5;}
thead tr{background:var(--sf2);}
th{padding:9px 13px;text-align:center;font-size:10px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--bd);cursor:pointer;user-select:none;}
th:hover,th.on{color:var(--ac);}
th .s{margin-left:3px;opacity:.4;}th.on .s{opacity:1;}
tbody tr{border-bottom:1px solid var(--sf2);}
tbody tr:hover{background:rgba(0,212,255,0.04);}
td{padding:8px 13px;text-align:center;}
td.r{text-align:center;font-weight:600;color:#94a3b8;}
td.cost{text-align:center;font-weight:700;color:var(--ac3);}
td.nm{font-weight:600;}
td.id{color:var(--mt);font-size:10px;}
td.z{color:var(--sf2);}
.tf{padding:9px 16px;border-top:1px solid var(--bd);font-size:11px;color:var(--mt);display:flex;justify-content:space-between;}
/* divider */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent);margin:8px 0 28px;}
/* kpi */
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:600px){.kg{grid-template-columns:1fr;}}
.kc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s;}
.kc:hover{transform:translateY(-2px);}
.kt{position:absolute;top:0;left:0;right:0;height:2px;}
.kl{font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-size:26px;font-weight:800;line-height:1;margin-bottom:4px;}
.ks{font-size:11px;color:var(--mt);}
/* tabs */
.tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:4px;width:100%;}
.tab{flex:1;padding:8px 18px;border:none;background:none;color:var(--mt);font-family:'IBM Plex Sans KR',sans-serif;font-size:12px;cursor:pointer;border-radius:8px;transition:all .2s;text-align:center;}
.tab.on{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);}
.sec{display:none;}.sec.on{display:block;}
/* charts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.cc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:20px;}
.ct{font-weight:700;font-size:13px;margin-bottom:4px;}
.cs{font-size:11px;color:var(--mt);margin-bottom:14px;}
.cw{position:relative;height:240px;}
.cwt{position:relative;height:300px;}
/* io analysis */
.ah{margin:26px 0 14px;}
.at{font-size:15px;font-weight:700;margin-bottom:4px;}
.ad{font-size:11px;color:var(--mt);}
.bi{font-size:10px;font-weight:600;background:rgba(52,211,153,0.15);color:#34d399;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.bo{font-size:10px;font-weight:600;background:rgba(244,114,182,0.15);color:#f472b6;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.kr{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ki{flex:1;min-width:80px;background:var(--sf2);border-radius:10px;padding:10px 14px;border:1px solid var(--bd);}
.kil{font-size:10px;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.kiv{font-size:14px;font-weight:700;}
.kip{font-size:10px;color:var(--mt);margin-top:2px;}
/* individual */
.ig{display:grid;grid-template-columns:270px 1fr;gap:16px;}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden;align-self:start;}
.ph{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.pt{font-size:13px;font-weight:700;}
.pc{font-size:11px;color:var(--mt);background:var(--sf2);padding:2px 8px;border-radius:10px;}
.sw{padding:10px 13px;border-bottom:1px solid var(--bd);}
.sw input{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:7px 11px;font-family:'IBM Plex Sans KR',sans-serif;font-size:12px;color:var(--tx);outline:none;}
.sw input:focus{border-color:var(--ac);}
.sw input::placeholder{color:var(--mt);}
.el{max-height:500px;overflow-y:auto;}
.el::-webkit-scrollbar{width:4px;}
.el::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}
.ei{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--sf2);display:flex;align-items:center;gap:10px;transition:all .15s;border-left:2px solid transparent;}
.ei:hover{background:var(--sf2);}
.ei.on{background:rgba(0,212,255,0.07);border-left-color:var(--ac);}
.ea{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.en{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ed{font-size:11px;color:var(--mt);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ec{font-size:12px;font-weight:700;color:var(--ac3);}
.dp{display:flex;flex-direction:column;gap:14px;}
.ns{background:var(--sf);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;gap:10px;color:var(--mt);}
.dh{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;}
.dg{position:absolute;right:-20px;top:-20px;width:140px;height:140px;border-radius:50%;pointer-events:none;}
.da{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0;}
.dn{font-size:20px;font-weight:800;}
.dm{font-size:11px;color:var(--mt);margin-top:3px;}
.dcost{margin-left:auto;text-align:right;}
.dcl{font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase;}
.dcv{font-size:28px;font-weight:800;color:var(--ac3);}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.tc2{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:15px;}
.th2{display:flex;align-items:center;gap:7px;margin-bottom:10px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.td2{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tt2{font-size:17px;font-weight:800;margin-bottom:10px;}
.mr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--sf2);}
.mr:last-child{border-bottom:none;}
.ml{font-size:10px;color:var(--mt);width:48px;}
.mb{flex:1;height:4px;background:var(--sf2);border-radius:2px;}
.mf{height:100%;border-radius:2px;transition:width .5s;}
.mv{font-size:11px;font-weight:600;min-width:44px;text-align:right;}
/* expand row */
.exp-btn{font-size:12px;color:var(--mt);cursor:pointer;transition:transform .2s;display:inline-block;padding:2px 6px;}
.exp-btn.open{transform:rotate(90deg);color:var(--ac);}
tbody tr.main-row{cursor:pointer;}
tbody tr.main-row:hover{background:rgba(0,212,255,0.04);}
tbody tr.main-row.open{background:rgba(0,212,255,0.06);}
tr.detail-row td{padding:0;}
tr.detail-row .detail-inner{display:none;padding:16px 20px;background:var(--sf2);border-top:1px solid var(--bd);}
tr.detail-row.open .detail-inner{display:block;}
.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:4px;}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
.dg-section{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;}
.dg-title{font-size:10px;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
.dg-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--sf2);}
.dg-row:last-child{border-bottom:none;}
.dg-label{font-size:12px;color:var(--mt);}
.dg-value{font-size:12px;font-weight:600;color:#94a3b8;}
.dg-value.z{color:var(--sf2);}
.dg-value.hi{color:var(--ac);}
/* IO card inner layout */
.io-inner{display:flex;gap:20px;align-items:center;}
.io-left{flex:1.5;text-align:center;}
.io-right{flex:1;border-left:1px solid var(--bd);padding-left:20px;display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.io-detail-row{display:grid;grid-template-columns:1fr auto;align-items:center;width:100%;}
@media(max-width:600px){
  .io-inner{flex-direction:column;gap:0;}
  .io-right{border-left:none;border-top:1px solid var(--bd);padding-left:0;padding-top:14px;margin-top:14px;width:100%;}
  .io-detail-row{grid-template-columns:1fr auto;}
  #modelGrid .io-card-label,#cacheGrid .io-card-label{font-size:9px;}
  #modelGrid .io-card-pct,#cacheGrid .io-card-pct{font-size:17px;}
  #modelGrid .io-card-tokens,#cacheGrid .io-card-tokens{font-size:11px;}
  #modelGrid .io-card-desc,#cacheGrid .io-card-desc{font-size:10px;}
}
.io-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;align-items:stretch;}
@media(max-width:600px){.io-grid{grid-template-columns:1fr;}}
.io-card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;display:flex;flex-direction:column;}
.io-card-top{position:absolute;top:0;left:0;right:0;height:3px;}
.io-card-label{font-size:10px;color:var(--mt);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.io-card-tokens{font-size:14px;font-weight:700;margin-bottom:2px;color:var(--mt);}
.io-card-pct{font-size:28px;font-weight:800;margin-bottom:6px;line-height:1;}
.io-card-desc{font-size:11px;color:var(--mt);margin-bottom:14px;}
.io-bar-wrap{height:6px;background:var(--sf2);border-radius:3px;overflow:hidden;}
.io-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease forwards;}
</style>
</head>
<body>
<header>
  <div class="logo">AI<span>.</span>USAGE</div>
  <div class="badge" id="badge">샘플 데이터</div>
</header>
<div id="app">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" onclick="sw('ov')">📊 전체 현황</button>
    <button class="tab" onclick="sw('ind')">👤 개인별 현황</button>
  </div>

  <!-- 전체 현황 -->
  <div class="sec on" id="sec-ov">

    <!-- 1. KPI -->
    <div class="kg" style="margin-bottom:24px">
      <div class="kc fu"><div class="kt" style="background:linear-gradient(90deg,#00d4ff,transparent)"></div><div class="kl">TOTAL COST</div><div class="kv" style="color:#00d4ff" id="kv-total"></div><div class="ks" id="ks-total"></div></div>
      <div class="kc fu"><div class="kt" style="background:linear-gradient(90deg,#a78bfa,transparent)"></div><div class="kl">인당 평균 비용</div><div class="kv" style="color:#a78bfa" id="kv-avg"></div><div class="ks" id="ks-avg"></div></div>
    </div>

    <!-- 2. 입력 / 출력 토큰 비율 -->
    <div style="margin-bottom:24px">
      <div class="sec-head" style="margin-bottom:14px">
        <div>
          <div class="sec-title" style="font-size:14px">입력 / 출력 토큰 비율</div>
          <div class="sec-desc">전체 토큰 대비 입력 · 출력 비중</div>
        </div>
      </div>
      <div class="io-grid" id="ioGrid"></div>
    </div>

    <!-- 3. Input / Cache Read / Cache Write 비율 -->
    <div style="margin-bottom:24px">
      <div class="sec-head" style="margin-bottom:14px">
        <div>
          <div class="sec-title" style="font-size:14px">Input / Cache Read / Cache Write 비율</div>
          <div class="sec-desc">입력 토큰 내 유형별 비중</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;" id="cacheGrid"></div>
    </div>

    <!-- 4. 모델별 토큰 사용 비율 -->
    <div style="margin-bottom:16px">
      <div class="sec-head" style="margin-bottom:14px">
        <div>
          <div class="sec-title" style="font-size:14px">모델별 토큰 사용 비율</div>
          <div class="sec-desc">전체 토큰 대비 Haiku · Sonnet · Opus 비중</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;" id="modelGrid"></div>
    </div>

  </div>

  <!-- 개인별 현황 -->
  <div class="sec" id="sec-ind">
    <div class="ig">
      <div class="panel">
        <div class="ph"><span class="pt">직원 목록</span><span class="pc" id="ec">0명</span></div>
        <div class="sw"><input id="si2" placeholder="이름 또는 부서 검색..." oninput="fl()"></div>
        <div class="el" id="el"></div>
      </div>
      <div class="dp" id="dp">
        <div class="ns"><div style="font-size:34px;opacity:.2">👤</div><div style="font-size:13px">직원을 선택하면 상세 현황이 표시됩니다</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const AV=[["#00d4ff","rgba(0,212,255,0.15)"],["#a78bfa","rgba(167,139,250,0.15)"],["#f59e0b","rgba(245,158,11,0.15)"],["#f472b6","rgba(244,114,182,0.15)"],["#34d399","rgba(52,211,153,0.15)"],["#fb923c","rgba(251,146,60,0.15)"]];
const DC=['rgba(0,212,255,0.8)','rgba(167,139,250,0.8)','rgba(245,158,11,0.8)','rgba(244,114,182,0.8)','rgba(52,211,153,0.8)','rgba(251,146,60,0.8)'];
let all=[],fil=[],rk='cost',ra=false,sel=null,ch={};
const pn=v=>{if(v==='-'||v===''||v==null)return 0;if(typeof v==='number')return v;return parseInt(String(v).replace(/,/g,''))||0;};
const fmt=n=>n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toLocaleString();
const fn=v=>v===0?'-':v.toLocaleString();
const pct=(v,t)=>t>0?Math.round(v/t*100):0;

const RAW=[
  {id:'EMP1001',name:'홍길동',d6:'개발본부',d7:'AI팀',cost:125,ih:6916,io:181881,is:0,oh:17404,oo:646480,os:0,crh:2827527,cro:145498844,crs:0,cwh:0,cwo:278595,cws:5481863},
  {id:'EMP1002',name:'김민준',d6:'마케팅본부',d7:'디지털마케팅팀',cost:87,ih:470,io:676,is:24,oh:36817,oo:78008,os:1405,crh:1555954,cro:107491310,crs:1291674,cwh:124890,cwo:3820273,cws:1673806},
  {id:'EMP1003',name:'이서연',d6:'인사본부',d7:'교육팀',cost:78,ih:37847,io:89803,is:20474,oh:6751,oo:279678,os:204259,crh:721170,cro:20740812,crs:33105337,cwh:132325,cwo:4534186,cws:5035746},
];

all=RAW.map(r=>{
  const ti=r.ih+r.io+r.is, to=r.oh+r.oo+r.os, tc=r.crh+r.cro+r.crs+r.cwh+r.cwo+r.cws;
  return{...r,
    inp:{h:r.ih,o:r.io,s:r.is,tot:ti},
    out:{h:r.oh,o:r.oo,s:r.os,tot:to},
    cac:{rh:r.crh,ro:r.cro,rs:r.crs,wh:r.cwh,wo:r.cwo,ws:r.cws,tot:tc},
    haiku:r.ih+r.oh+r.crh+r.cwh, sonnet:r.is+r.os+r.crs+r.cws, opus:r.io+r.oo+r.cro+r.cwo,
    total:ti+to+tc
  };
});
fil=[...all].sort((a,b)=>b.cost-a.cost);
document.getElementById('badge').textContent=`${all.length}명 · 샘플 데이터`;

// raw table
// kpis
function rkpi(){
  const tc=all.reduce((s,d)=>s+d.cost,0);
  const avg=all.length?Math.round(tc/all.length):0;
  document.getElementById('kv-total').textContent=`$${tc.toLocaleString()}`;
  document.getElementById('ks-total').textContent=`${all.length}명 합계`;
  document.getElementById('kv-avg').textContent=`$${avg.toLocaleString()}`;
  document.getElementById('ks-avg').textContent=`1인당 평균`;
}

function sw(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ov','ind'][i]===t));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  if(t==='ov'){rkpi();rio();rov();}
}

// overview charts
function rov(){
  const tip={backgroundColor:'#1a2535',titleColor:'#e2e8f0',bodyColor:'#94a3b8'};
  const tk={color:'#64748b',font:{family:'IBM Plex Sans KR',size:11}};
  const gd={color:'rgba(255,255,255,0.04)'};

  const tH=all.reduce((s,d)=>s+d.haiku,0),tS=all.reduce((s,d)=>s+d.sonnet,0),tO=all.reduce((s,d)=>s+d.opus,0);
  const tM=tH+tS+tO||1;
  const mp=(v)=>(v/tM*100).toFixed(2);
  document.getElementById('modelGrid').innerHTML=[
    {label:'Opus',tokens:tO,pct:mp(tO),color:'#f59e0b',desc:'고성능 모델'},
    {label:'Sonnet',tokens:tS,pct:mp(tS),color:'#a78bfa',desc:'균형형 모델'},
    {label:'Haiku',tokens:tH,pct:mp(tH),color:'#00d4ff',desc:'경량 고속 모델'},
  ].map(c=>`
    <div class="io-card fu">
      <div class="io-card-top" style="background:${c.color}"></div>
      <div class="io-card-label">${c.label}</div>
      <div class="io-card-pct" style="color:${c.color}">${c.pct}%</div>
      <div class="io-card-tokens">${fmt(c.tokens)} tokens</div>
      <div class="io-card-desc">${c.desc}</div>
    </div>`).join('');

}

// employee list
function rl(){
  document.getElementById('ec').textContent=`${fil.length}명`;
  document.getElementById('el').innerHTML=fil.map(d=>{
    const oi=all.indexOf(d);const[fg,bg]=AV[oi%AV.length];
    return`<div class="ei${oi===sel?' on':''}" onclick="se(${oi})"><div class="ea" style="background:${bg};color:${fg}">${d.name[0]}</div><div style="flex:1;min-width:0"><div class="en">${d.name} <span style="font-size:10px;color:var(--mt);font-weight:400">${d.id}</span></div><div class="ed">${d.d6} · ${d.d7}</div></div><div class="ec">$${d.cost}</div></div>`;
  }).join('');
}
function fl(){
  const q=document.getElementById('si2').value.toLowerCase();
  fil=all.filter(d=>d.name.includes(q)||d.d6.includes(q)||d.d7.includes(q)||d.id.toLowerCase().includes(q)).sort((a,b)=>b.cost-a.cost);
  rl();
}
function mr(l,v,max,c){return`<div class="mr"><span class="ml">${l}</span><div class="mb"><div class="mf" style="width:${Math.round(v/max*100)}%;background:${c}"></div></div><span class="mv">${fmt(v)}</span></div>`;}

function se(idx){
  sel=idx;rl();
  const d=all[idx];const[fg,bg]=AV[idx%AV.length];
  if(ch.cp)ch.cp.destroy();if(ch.cb)ch.cb.destroy();
  const mI=Math.max(d.inp.h,d.inp.o,d.inp.s,1),mO=Math.max(d.out.h,d.out.o,d.out.s,1);
  const mC=Math.max(d.cac.rh+d.cac.wh,d.cac.ro+d.cac.wo,d.cac.rs+d.cac.ws,1);
  document.getElementById('dp').innerHTML=`
    <div class="dh fu"><div class="dg" style="background:radial-gradient(circle,${bg},transparent)"></div>
      <div class="da" style="background:${bg};color:${fg}">${d.name[0]}</div>
      <div><div class="dn">${d.name}</div><div class="dm">${d.id} · ${d.d6} · ${d.d7}</div></div>
      <div class="dcost"><div class="dcl">TOTAL COST</div><div class="dcv">$${d.cost.toLocaleString()}</div></div>
    </div>
    <div class="tg fu">
      <div class="tc2"><div class="th2"><div class="td2" style="background:#34d399"></div><span style="color:#34d399">Input Tokens</span></div><div class="tt2" style="color:#34d399">${fmt(d.inp.tot)}</div>${mr('HAIKU',d.inp.h,mI,'#34d399')}${mr('SONNET',d.inp.s,mI,'#34d399')}${mr('OPUS',d.inp.o,mI,'#34d399')}</div>
      <div class="tc2"><div class="th2"><div class="td2" style="background:#f472b6"></div><span style="color:#f472b6">Output Tokens</span></div><div class="tt2" style="color:#f472b6">${fmt(d.out.tot)}</div>${mr('HAIKU',d.out.h,mO,'#f472b6')}${mr('SONNET',d.out.s,mO,'#f472b6')}${mr('OPUS',d.out.o,mO,'#f472b6')}</div>
      <div class="tc2"><div class="th2"><div class="td2" style="background:#60a5fa"></div><span style="color:#60a5fa">Cache Tokens</span></div><div class="tt2" style="color:#60a5fa">${fmt(d.cac.tot)}</div>${mr('HAIKU',d.cac.rh+d.cac.wh,mC,'#60a5fa')}${mr('SONNET',d.cac.rs+d.cac.ws,mC,'#60a5fa')}${mr('OPUS',d.cac.ro+d.cac.wo,mC,'#60a5fa')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px" class="fu">
      <div class="cc"><div class="ct">모델별 토큰 분포</div><div class="cw"><canvas id="cp"></canvas></div></div>
      <div class="cc"><div class="ct">Input / Output / Cache</div><div class="cw"><canvas id="cb"></canvas></div></div>
    </div>`;
  const tip={backgroundColor:'#1a2535',titleColor:'#e2e8f0',bodyColor:'#94a3b8'};
  const hT=d.inp.h+d.out.h+d.cac.rh+d.cac.wh,sT=d.inp.s+d.out.s+d.cac.rs+d.cac.ws,oT=d.inp.o+d.out.o+d.cac.ro+d.cac.wo;
  ch.cp=new Chart(document.getElementById('cp'),{type:'doughnut',data:{labels:['Haiku','Sonnet','Opus'],datasets:[{data:[hT,sT,oT],backgroundColor:['rgba(0,212,255,0.85)','rgba(167,139,250,0.85)','rgba(245,158,11,0.85)'],borderColor:'#0f1623',borderWidth:3,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{family:'IBM Plex Sans KR',size:11},padding:12,boxWidth:10}},tooltip:{...tip,callbacks:{label:c=>` ${fmt(c.raw)} tokens`}}}}});
  ch.cb=new Chart(document.getElementById('cb'),{type:'bar',data:{labels:['Haiku','Sonnet','Opus'],datasets:[{label:'Input',data:[d.inp.h,d.inp.s,d.inp.o],backgroundColor:'rgba(52,211,153,0.75)',borderRadius:4},{label:'Output',data:[d.out.h,d.out.s,d.out.o],backgroundColor:'rgba(244,114,182,0.75)',borderRadius:4},{label:'Cache',data:[d.cac.rh+d.cac.wh,d.cac.rs+d.cac.ws,d.cac.ro+d.cac.wo],backgroundColor:'rgba(96,165,250,0.75)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'IBM Plex Sans KR',size:11},padding:10,boxWidth:10}},tooltip:{...tip,callbacks:{label:c=>` ${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{family:'IBM Plex Sans KR',size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{family:'IBM Plex Sans KR',size:11},callback:v=>fmt(v)}}}}});
}

function rio(){
  const ih=all.reduce((s,d)=>s+d.ih,0),io=all.reduce((s,d)=>s+d.io,0),is_=all.reduce((s,d)=>s+d.is,0);
  const oh=all.reduce((s,d)=>s+d.oh,0),oo=all.reduce((s,d)=>s+d.oo,0),os_=all.reduce((s,d)=>s+d.os,0);
  const crh=all.reduce((s,d)=>s+d.crh,0),cro=all.reduce((s,d)=>s+d.cro,0),crs=all.reduce((s,d)=>s+d.crs,0);
  const cwh=all.reduce((s,d)=>s+d.cwh,0),cwo=all.reduce((s,d)=>s+d.cwo,0),cws=all.reduce((s,d)=>s+d.cws,0);
  const input=ih+io+is_;
  const cacheRead=crh+cro+crs;
  const cacheWrite=cwh+cwo+cws;
  const output=oh+oo+os_;
  const totalInput=input+cacheRead+cacheWrite;
  const grand=totalInput+output;
  const gp=(v)=>grand>0?(v/grand*100).toFixed(2):'0.00';

  document.getElementById('ioGrid').innerHTML=`
    <div class="io-card fu">
      <div class="io-card-top" style="background:linear-gradient(90deg,#34d399,#00d4ff)"></div>
      <div class="io-card-label">입력 토큰 비율</div>
      <div class="io-card-pct" style="color:#34d399">${gp(totalInput)}%</div>
      <div class="io-card-tokens">${fmt(totalInput)} tokens</div>
      <div class="io-card-desc">전체 토큰 대비 입력 비율</div>
    </div>
    <div class="io-card fu">
      <div class="io-card-top" style="background:#f472b6"></div>
      <div class="io-card-label">출력 토큰 비율</div>
      <div class="io-card-pct" style="color:#f472b6">${gp(output)}%</div>
      <div class="io-card-tokens">${fmt(output)} tokens</div>
      <div class="io-card-desc">전체 토큰 대비 출력 비율</div>
    </div>`;

  // cache grid
  const ip=(v)=>totalInput>0?(v/totalInput*100).toFixed(2):'0.00';
  document.getElementById('cacheGrid').innerHTML=[
    {label:'Input (Miss)',tokens:input,pct:ip(input),color:'#34d399',desc:'Cache 미히트 입력'},
    {label:'Cache Read',tokens:cacheRead,pct:ip(cacheRead),color:'#00d4ff',desc:'Cache 히트 읽기'},
    {label:'Cache Write',tokens:cacheWrite,pct:ip(cacheWrite),color:'#a78bfa',desc:'Cache 히트 쓰기'},
  ].map(c=>`
    <div class="io-card fu" id="cacheGridCard">
      <div class="io-card-top" style="background:${c.color}"></div>
      <div class="io-card-label">${c.label}</div>
      <div class="io-card-pct" style="color:${c.color}">${c.pct}%</div>
      <div class="io-card-tokens">${fmt(c.tokens)} tokens</div>
      <div class="io-card-desc">${c.desc}</div>
    </div>`).join('');
}

rkpi();rio();rov();rl();
</script>
</body>
</html>
