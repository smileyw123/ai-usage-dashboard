<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Blast!</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: linear-gradient(180deg, #e8dff5 0%, #d4e7fa 40%, #dff5e3 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--gap-main, 10px);
  padding: var(--pad-main, 12px);
  width: 100%;
  max-width: 480px;
}

/* ===== Header ===== */
#header {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  width: 100%;
  padding: 0 4px;
}

#best-area {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.45);
  padding: 4px 10px;
  border-radius: 20px;
}

#best-area .best-icon {
  width: 14px;
  height: 14px;
  display: inline-block;
}

#best-area .best-icon svg {
  width: 100%;
  height: 100%;
}

#best-area .best-val {
  font-size: 13px;
  color: #9a8bc2;
  font-weight: 700;
}

/* ===== Score - center big ===== */
#score-display {
  text-align: center;
  margin-top: -2px;
}

#score-display .score-value {
  font-size: var(--font-score, 44px);
  font-weight: 900;
  color: #6c5b9e;
  line-height: 1;
  letter-spacing: -1px;
}

#score-display .score-label {
  font-size: 10px;
  color: #b5a8d5;
  text-transform: uppercase;
  letter-spacing: 3px;
  font-weight: 600;
}

/* ===== Streak bar ===== */
#streak-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 3px;
  overflow: hidden;
}

#streak-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #a8d8ea, #aa96da, #fcbad3, #f9e8a0);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ===== Grid ===== */
#grid-container {
  position: relative;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(8px);
  border-radius: 18px;
  padding: var(--grid-pad, 6px);
  box-shadow: 0 8px 32px rgba(140,120,180,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
}

#grid {
  display: grid;
  grid-template-columns: repeat(10, var(--cell, 30px));
  grid-template-rows: repeat(10, var(--cell, 30px));
  gap: var(--cell-gap, 2px);
}

.cell {
  width: var(--cell, 30px);
  height: var(--cell, 30px);
  background: rgba(255,255,255,0.35);
  border-radius: var(--cell-radius, 7px);
  transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
}

.cell.filled {
  border-radius: var(--cell-radius, 7px);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.55) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.06) 0%, transparent 50%);
  box-shadow:
    inset 0 -3px 1px rgba(0,0,0,0.08),
    inset 0 2px 1px rgba(255,255,255,0.6),
    0 2px 6px rgba(0,0,0,0.07);
}

.cell.preview {
  opacity: 0.5;
  transform: scale(0.9);
  border-radius: var(--cell-radius, 7px);
}

.cell.preview-invalid {
  background: #edb0b0 !important;
  background-image: none !important;
  opacity: 0.4;
}

/* Line-will-clear glow hint */
.cell.will-clear {
  animation: willClearPulse 0.8s ease-in-out infinite alternate;
  box-shadow:
    inset 0 0 8px rgba(255,255,255,0.7),
    0 0 10px rgba(200,170,240,0.5) !important;
  filter: brightness(1.25) saturate(1.3);
}

@keyframes willClearPulse {
  0% { filter: brightness(1.2) saturate(1.2); }
  100% { filter: brightness(1.45) saturate(1.5); }
}

.cell.clearing {
  animation: clearBounce 0.5s ease-out forwards;
}

.cell.clearing-spin {
  animation: clearSpin 0.55s ease-out forwards;
}

.cell.clearing-jelly {
  animation: clearJelly 0.6s ease-out forwards;
}

.cell.clearing-float {
  animation: clearFloat 0.65s ease-out forwards;
}

.cell.clearing-pop {
  animation: clearPop 0.45s ease-out forwards;
}

@keyframes clearBounce {
  0% { transform: scale(1); opacity: 1; }
  20% { transform: scale(1.15); opacity: 0.9; }
  40% { transform: scale(0.9); opacity: 0.7; }
  60% { transform: scale(1.05); opacity: 0.45; }
  100% { transform: scale(0.85); opacity: 0; }
}

@keyframes clearSpin {
  0% { transform: scale(1) rotate(0deg); opacity: 1; }
  50% { transform: scale(0.9) rotate(180deg); opacity: 0.5; }
  100% { transform: scale(0.7) rotate(360deg); opacity: 0; }
}

@keyframes clearJelly {
  0% { transform: scale(1, 1); opacity: 1; }
  15% { transform: scale(1.15, 0.85); opacity: 0.85; }
  30% { transform: scale(0.85, 1.1); opacity: 0.65; }
  50% { transform: scale(1.05, 0.95); opacity: 0.4; }
  100% { transform: scale(0.9, 0.9); opacity: 0; }
}

@keyframes clearFloat {
  0% { transform: scale(1) translateY(0); opacity: 1; }
  40% { transform: scale(0.95) translateY(-10px); opacity: 0.6; }
  100% { transform: scale(0.8) translateY(-25px); opacity: 0; }
}

@keyframes clearPop {
  0% { transform: scale(1); opacity: 1; }
  30% { transform: scale(1.1); opacity: 0.7; }
  100% { transform: scale(0.85); opacity: 0; }
}

/* Particles */
.particle {
  position: fixed;
  pointer-events: none;
  z-index: 90;
  border-radius: 50%;
  animation: particleFly var(--dur, 0.7s) ease-out forwards;
}

.particle.star {
  border-radius: 2px;
  transform: rotate(45deg);
  animation: particleStar var(--dur, 0.8s) ease-out forwards;
}

.particle.heart {
  border-radius: 0;
  background: transparent !important;
  animation: particleHeart var(--dur, 0.9s) ease-out forwards;
}

.particle.heart::before {
  content: '';
  font-size: var(--size, 8px);
  line-height: 1;
}

@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx, 20px), var(--dy, -30px)) scale(0); opacity: 0; }
}

@keyframes particleStar {
  0% { transform: rotate(45deg) translate(0, 0) scale(1); opacity: 1; }
  100% { transform: rotate(200deg) translate(var(--dx, 20px), var(--dy, -30px)) scale(0); opacity: 0; }
}

@keyframes particleHeart {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx, 15px), var(--dy, -40px)) scale(0.3); opacity: 0; }
}

/* Screen shake */
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-3px, 2px); }
  40% { transform: translate(3px, -2px); }
  60% { transform: translate(-2px, 3px); }
  80% { transform: translate(2px, -1px); }
}

#grid-container.shaking {
  animation: shake 0.3s ease-out;
}


@keyframes emojiBurst {
  0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 1; }
  20% { transform: translate(calc(var(--ex) * 0.2), calc(var(--ey) * 0.3)) scale(1.2) rotate(30deg); opacity: 1; }
  100% { transform: translate(var(--ex), var(--ey)) scale(0.5) rotate(60deg); opacity: 0; }
}

/* ===== Piece tray ===== */
#piece-tray {
  display: flex;
  justify-content: space-around;
  align-items: center;
  min-height: var(--tray-height, 90px);
  padding: 10px 4px;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(8px);
  border-radius: 18px;
  width: 100%;
  box-shadow: 0 4px 16px rgba(140,120,180,0.1);
}

.piece-container {
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: grab;
  transition: transform 0.2s, opacity 0.2s;
  padding: 4px;
  flex: 1;
}

.piece-container:hover {
  transform: scale(1.1);
}

.piece-container.dragging {
  opacity: 0.3;
  transform: scale(0.8);
}

.piece-container.used {
  visibility: hidden;
}

.piece-grid {
  display: grid;
  gap: 1.5px;
}

.piece-cell {
  width: var(--piece-cell, 18px);
  height: var(--piece-cell, 18px);
  border-radius: var(--piece-radius, 5px);
}

.piece-cell.filled {
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.5) 0%, transparent 55%);
  box-shadow:
    inset 0 -2px 0 rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.5),
    0 1px 4px rgba(0,0,0,0.06);
}

.piece-cell.empty {
  background: transparent;
}

/* ===== Dragging piece (floating) ===== */
#drag-piece {
  position: fixed;
  pointer-events: none;
  z-index: 1000;
  display: none;
}

#drag-piece .piece-grid {
  gap: var(--cell-gap, 2px);
}

#drag-piece .piece-cell {
  width: var(--cell, 30px);
  height: var(--cell, 30px);
  border-radius: var(--cell-radius, 7px);
}

#drag-piece .piece-cell.filled {
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.55) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.06) 0%, transparent 50%);
  box-shadow:
    inset 0 -3px 1px rgba(0,0,0,0.08),
    inset 0 2px 1px rgba(255,255,255,0.6),
    0 5px 14px rgba(0,0,0,0.14);
}

/* ===== Combo display ===== */
#combo-display {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 42px;
  font-weight: 900;
  color: #c9a0dc;
  text-shadow: 0 0 24px rgba(201,160,220,0.5), 0 2px 0 #fff;
  pointer-events: none;
  opacity: 0;
  z-index: 100;
}

#combo-display.show {
  animation: comboAnim 0.8s ease-out forwards;
}

@keyframes comboAnim {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
}

/* Score popup */
.score-popup {
  position: fixed;
  font-size: 20px;
  font-weight: 800;
  color: #aa96da;
  pointer-events: none;
  z-index: 100;
  text-shadow: 0 1px 0 #fff;
  animation: scorePopup 0.8s ease-out forwards;
}

@keyframes scorePopup {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}

/* ===== Game Over - overlay on top of game ===== */
#game-area {
  position: relative;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--gap-main, 10px);
}

#game-area.game-over-state #grid-container,
#game-area.game-over-state #piece-tray,
#game-area.game-over-state #streak-bar {
  filter: blur(5px) brightness(0.88);
  pointer-events: none;
  transition: filter 0.6s ease;
}

#game-over {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 50;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 14px;
  background: rgba(232, 223, 245, 0.55);
  border-radius: 18px;
  opacity: 0;
}

#game-over.show {
  display: flex;
  animation: gameOverFadeIn 0.6s ease-out forwards;
}

@keyframes gameOverFadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

#game-over h2 {
  font-size: 28px;
  color: #b07cc6;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  margin: 0;
}

#game-over .go-scores {
  display: flex;
  align-items: center;
  gap: 16px;
}

#game-over .final-score {
  font-size: 22px;
  color: #6c5b9e;
  font-weight: 700;
}

#game-over .best-score-display {
  font-size: 13px;
  color: #9a8bc2;
  display: flex;
  align-items: center;
  gap: 4px;
}

#restart-btn {
  padding: 12px 40px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #aa96da, #fcbad3);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(170,150,218,0.35);
}

#restart-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(170,150,218,0.5);
}
</style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div id="best-area">
      <span class="best-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#b5a8d5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6-6 6 6"/><path d="M12 3v12"/><circle cx="12" cy="20" r="2" fill="#b5a8d5" stroke="none"/></svg></span>
      <span class="best-val" id="best-score">0</span>
    </div>
  </div>

  <div id="score-display">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>

  <div id="game-area">
    <div id="streak-bar"><div id="streak-fill"></div></div>

    <div id="grid-container">
      <div id="grid"></div>
    </div>

    <div id="piece-tray"></div>

    <div id="game-over">
      <h2>Game Over!</h2>
      <div class="go-scores">
        <div class="final-score" id="final-score"></div>
        <div class="best-score-display" id="best-score-final"></div>
      </div>
      <button id="restart-btn">다시 하기</button>
    </div>
  </div>
</div>

<div id="drag-piece">
  <div class="piece-grid"></div>
</div>

<div id="combo-display"></div>

<script>
const GRID_SIZE = 10;

let CELL_SIZE = 30;
let CELL_GAP = 2;
let PIECE_CELL = 18;

// Pastel candy colors
const COLORS = [
  '#f4b0c6', // candy pink
  '#b8e6ca', // mint
  '#a6d4f2', // baby blue
  '#f5e4a1', // butter yellow
  '#cdb4f0', // soft violet
  '#f9c9a3', // apricot
  '#a3dcd6', // seafoam
  '#e0bbf7', // lilac
  '#f9b5b1', // coral blush
  '#b3d9f7', // powder blue
];

const SHAPES = [
  { cells: [[0,0]] },
  { cells: [[0,0],[0,1]] },
  { cells: [[0,0],[1,0]] },
  { cells: [[0,0],[0,1],[0,2]] },
  { cells: [[0,0],[1,0],[2,0]] },
  { cells: [[0,0],[0,1],[0,2],[0,3]] },
  { cells: [[0,0],[1,0],[2,0],[3,0]] },
  { cells: [[0,0],[0,1],[0,2],[0,3],[0,4]] },
  { cells: [[0,0],[1,0],[2,0],[3,0],[4,0]] },
  { cells: [[0,0],[0,1],[1,0],[1,1]] },
  { cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]] },
  { cells: [[0,0],[1,0],[1,1]] },
  { cells: [[0,0],[0,1],[1,0]] },
  { cells: [[0,0],[0,1],[1,1]] },
  { cells: [[0,1],[1,0],[1,1]] },
  { cells: [[0,0],[1,0],[2,0],[2,1],[2,2]] },
  { cells: [[0,0],[0,1],[0,2],[1,0],[2,0]] },
  { cells: [[0,0],[0,1],[0,2],[1,2],[2,2]] },
  { cells: [[0,2],[1,2],[2,0],[2,1],[2,2]] },
  { cells: [[0,0],[0,1],[0,2],[1,1]] },
  { cells: [[0,0],[1,0],[1,1],[2,0]] },
  { cells: [[0,1],[1,0],[1,1],[1,2]] },
  { cells: [[0,1],[1,0],[1,1],[2,1]] },
  { cells: [[0,0],[0,1],[1,1],[1,2]] },
  { cells: [[0,1],[0,2],[1,0],[1,1]] },
  { cells: [[0,0],[1,0],[1,1],[2,1]] },
  { cells: [[0,1],[1,0],[1,1],[2,0]] },
  { cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2]] },
  { cells: [[0,0],[0,1],[1,0],[1,1],[2,0],[2,1]] },
];

let grid = [];
let pieces = [];
let score = 0;
let bestScore = parseInt(localStorage.getItem('blockblast_best') || '0');
let combo = 0;
let draggingPiece = null;
let draggingIndex = -1;
let dragOffsetX = 0;
let dragOffsetY = 0;

function calcSizes() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const pad = 28;
  const gridPad = 12;

  const availW = Math.min(vw - pad, 480 - pad);
  const maxCellFromW = Math.floor((availW - gridPad - 9 * 2) / 10);

  const reservedH = 260;
  const availH = vh - reservedH;
  const maxCellFromH = Math.floor((availH - gridPad - 9 * 2) / 10);

  CELL_SIZE = Math.max(20, Math.min(maxCellFromW, maxCellFromH, 40));
  CELL_GAP = CELL_SIZE >= 28 ? 2.5 : 2;
  PIECE_CELL = Math.max(12, Math.floor(CELL_SIZE * 0.55));

  const root = document.documentElement.style;
  root.setProperty('--cell', CELL_SIZE + 'px');
  root.setProperty('--cell-gap', CELL_GAP + 'px');
  root.setProperty('--piece-cell', PIECE_CELL + 'px');
  root.setProperty('--cell-radius', Math.max(5, Math.floor(CELL_SIZE * 0.22)) + 'px');
  root.setProperty('--piece-radius', Math.max(3, Math.floor(PIECE_CELL * 0.22)) + 'px');
  root.setProperty('--grid-pad', Math.max(5, Math.floor(CELL_SIZE * 0.18)) + 'px');
  root.setProperty('--tray-height', Math.floor(PIECE_CELL * 5 + 24) + 'px');

  if (vw < 380) {
    root.setProperty('--font-score', '38px');
    root.setProperty('--gap-main', '6px');
    root.setProperty('--pad-main', '8px');
  } else {
    root.setProperty('--font-score', '48px');
    root.setProperty('--gap-main', '8px');
    root.setProperty('--pad-main', '14px');
  }
}

function init() {
  calcSizes();
  grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(null));
  score = 0;
  combo = 0;
  updateScore();
  buildGrid();
  spawnPieces();
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('game-area').classList.remove('game-over-state');
  document.getElementById('best-score').textContent = bestScore;
}

function buildGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      gridEl.appendChild(cell);
    }
  }
}

function renderGrid() {
  const cells = document.querySelectorAll('#grid .cell');
  cells.forEach(cell => {
    const r = parseInt(cell.dataset.row);
    const c = parseInt(cell.dataset.col);
    cell.className = 'cell';
    if (grid[r][c]) {
      cell.classList.add('filled');
      cell.style.background = grid[r][c];
    } else {
      cell.style.background = '';
    }
  });
}

function randomPiece() {
  const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  return { shape: shape.cells, color, used: false };
}

function spawnPieces() {
  pieces = [randomPiece(), randomPiece(), randomPiece()];
  renderPieces();
}

function renderPieces() {
  const tray = document.getElementById('piece-tray');
  tray.innerHTML = '';
  pieces.forEach((piece, idx) => {
    const container = document.createElement('div');
    container.className = 'piece-container' + (piece.used ? ' used' : '');
    container.dataset.index = idx;

    const { rows, cols } = getShapeBounds(piece.shape);
    const pieceGrid = document.createElement('div');
    pieceGrid.className = 'piece-grid';
    pieceGrid.style.gridTemplateColumns = `repeat(${cols}, ${PIECE_CELL}px)`;
    pieceGrid.style.gridTemplateRows = `repeat(${rows}, ${PIECE_CELL}px)`;

    const cellSet = new Set(piece.shape.map(([r,c]) => `${r},${c}`));
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'piece-cell';
        if (cellSet.has(`${r},${c}`)) {
          cell.classList.add('filled');
          cell.style.background = piece.color;
        } else {
          cell.classList.add('empty');
        }
        pieceGrid.appendChild(cell);
      }
    }

    container.appendChild(pieceGrid);
    tray.appendChild(container);

    container.addEventListener('mousedown', (e) => startDrag(e, idx));
    container.addEventListener('touchstart', (e) => startDrag(e, idx), { passive: false });
  });
}

function getShapeBounds(shape) {
  let maxR = 0, maxC = 0;
  shape.forEach(([r,c]) => { maxR = Math.max(maxR, r); maxC = Math.max(maxC, c); });
  return { rows: maxR + 1, cols: maxC + 1 };
}

// ===== DRAG & DROP =====

function startDrag(e, idx) {
  if (pieces[idx].used) return;
  e.preventDefault();

  draggingPiece = pieces[idx];
  draggingIndex = idx;

  const piece = draggingPiece;
  const { rows, cols } = getShapeBounds(piece.shape);

  const dragEl = document.getElementById('drag-piece');
  const pieceGrid = dragEl.querySelector('.piece-grid');
  pieceGrid.innerHTML = '';
  pieceGrid.style.gridTemplateColumns = `repeat(${cols}, ${CELL_SIZE}px)`;
  pieceGrid.style.gridTemplateRows = `repeat(${rows}, ${CELL_SIZE}px)`;

  const cellSet = new Set(piece.shape.map(([r,c]) => `${r},${c}`));
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'piece-cell';
      if (cellSet.has(`${r},${c}`)) {
        cell.classList.add('filled');
        cell.style.background = piece.color;
      } else {
        cell.classList.add('empty');
      }
      pieceGrid.appendChild(cell);
    }
  }

  dragEl.style.display = 'block';

  const totalW = cols * CELL_SIZE + (cols - 1) * CELL_GAP;
  const totalH = rows * CELL_SIZE + (rows - 1) * CELL_GAP;
  dragOffsetX = totalW / 2;
  dragOffsetY = totalH + 40;

  const pos = getEventPos(e);
  dragEl.style.left = (pos.x - dragOffsetX) + 'px';
  dragEl.style.top = (pos.y - dragOffsetY) + 'px';

  document.querySelectorAll('.piece-container')[idx].classList.add('dragging');
}

function moveDrag(e) {
  if (!draggingPiece) return;
  e.preventDefault();

  const pos = getEventPos(e);
  const dragEl = document.getElementById('drag-piece');
  dragEl.style.left = (pos.x - dragOffsetX) + 'px';
  dragEl.style.top = (pos.y - dragOffsetY) + 'px';

  clearPreview();
  const gridPos = getGridPosition(pos.x - dragOffsetX, pos.y - dragOffsetY);
  if (gridPos) showPreview(gridPos.row, gridPos.col, draggingPiece);
}

function endDrag(e) {
  if (!draggingPiece) return;

  const pos = getEventPos(e);
  document.getElementById('drag-piece').style.display = 'none';
  clearPreview();

  const gridPos = getGridPosition(pos.x - dragOffsetX, pos.y - dragOffsetY);
  if (gridPos && canPlace(gridPos.row, gridPos.col, draggingPiece.shape)) {
    placePiece(gridPos.row, gridPos.col, draggingPiece);
    pieces[draggingIndex].used = true;
    renderPieces();

    setTimeout(() => {
      const cleared = checkAndClearLines();
      if (cleared > 0) {
        combo++;
        const points = cleared * GRID_SIZE + (combo > 1 ? combo * 10 : 0);
        addScore(points);
        if (combo > 1) showCombo(combo);
      } else {
        combo = 0;
      }
      updateStreakBar();

      if (pieces.every(p => p.used)) setTimeout(() => spawnPieces(), 300);
      setTimeout(() => { if (isGameOver()) showGameOver(); }, 350);
    }, 50);
  }

  const containers = document.querySelectorAll('.piece-container');
  if (containers[draggingIndex]) containers[draggingIndex].classList.remove('dragging');
  draggingPiece = null;
  draggingIndex = -1;
}

function getEventPos(e) {
  if (e.changedTouches && e.changedTouches.length > 0)
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  if (e.touches && e.touches.length > 0)
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function getGridPosition(dragX, dragY) {
  const rect = document.getElementById('grid').getBoundingClientRect();
  const step = CELL_SIZE + CELL_GAP;
  const col = Math.round((dragX - rect.left) / step);
  const row = Math.round((dragY - rect.top) / step);
  if (row < 0 || col < 0 || row >= GRID_SIZE || col >= GRID_SIZE) return null;
  return { row, col };
}

// ===== GRID LOGIC =====

function canPlace(row, col, shape) {
  return shape.every(([dr, dc]) => {
    const r = row + dr, c = col + dc;
    return r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE && !grid[r][c];
  });
}

function placePiece(row, col, piece) {
  piece.shape.forEach(([dr, dc]) => { grid[row + dr][col + dc] = piece.color; });
  addScore(piece.shape.length);
  renderGrid();
}

const CLEAR_ANIMS = ['clearing', 'clearing-spin', 'clearing-jelly', 'clearing-float', 'clearing-pop'];
const PARTICLE_EMOJIS = ['sparkle', 'heart', 'star'];

function checkAndClearLines() {
  const rowsToClear = [], colsToClear = [];
  for (let r = 0; r < GRID_SIZE; r++) {
    if (grid[r].every(c => c !== null)) rowsToClear.push(r);
  }
  for (let c = 0; c < GRID_SIZE; c++) {
    let full = true;
    for (let r = 0; r < GRID_SIZE; r++) { if (!grid[r][c]) { full = false; break; } }
    if (full) colsToClear.push(c);
  }
  if (rowsToClear.length === 0 && colsToClear.length === 0) return 0;

  const totalCleared = rowsToClear.length + colsToClear.length;

  // Pick a random clear animation style for this clear event
  const animClass = CLEAR_ANIMS[Math.floor(Math.random() * CLEAR_ANIMS.length)];

  const cellsToAnimate = new Set();
  rowsToClear.forEach(r => { for (let c = 0; c < GRID_SIZE; c++) cellsToAnimate.add(`${r},${c}`); });
  colsToClear.forEach(c => { for (let r = 0; r < GRID_SIZE; r++) cellsToAnimate.add(`${r},${c}`); });

  const gridCells = document.querySelectorAll('#grid .cell');

  // Update grid data immediately (so other logic sees cleared state)
  rowsToClear.forEach(r => { for (let c = 0; c < GRID_SIZE; c++) grid[r][c] = null; });
  colsToClear.forEach(c => { for (let r = 0; r < GRID_SIZE; r++) grid[r][c] = null; });

  // Staggered clear animation - each cell cleans itself up on animationend
  let delay = 0;
  cellsToAnimate.forEach(key => {
    const [r, c] = key.split(',').map(Number);
    const cell = gridCells[r * GRID_SIZE + c];
    const color = cell.style.background;

    setTimeout(() => {
      // Spawn particles
      const rect = cell.getBoundingClientRect();
      spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, color, totalCleared >= 3 ? 5 : 3);

      // Start clear animation
      cell.classList.remove('filled');
      cell.classList.add(animClass);

      // When animation finishes, quietly reset the cell
      cell.addEventListener('animationend', function handler() {
        cell.removeEventListener('animationend', handler);
        cell.className = 'cell';
        cell.style.background = '';
        cell.style.opacity = '';
      });
    }, delay);

    delay += 20;
  });

  // Screen shake for multi-line clears
  if (totalCleared >= 2) {
    document.getElementById('grid-container').classList.add('shaking');
    setTimeout(() => document.getElementById('grid-container').classList.remove('shaking'), 300);
  }

  // Emoji burst for big clears
  if (totalCleared >= 2) {
    const gridRect = document.getElementById('grid').getBoundingClientRect();
    spawnEmojiBurst(gridRect.left + gridRect.width / 2, gridRect.top + gridRect.height / 2, totalCleared);
  }

  return totalCleared;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const type = Math.random();
    const size = 4 + Math.random() * 5;
    const dx = (Math.random() - 0.5) * 60;
    const dy = -15 - Math.random() * 45;
    const dur = 0.5 + Math.random() * 0.4;

    if (type < 0.4) {
      // Circle particle
      p.className = 'particle';
      p.style.background = color;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
    } else if (type < 0.7) {
      // Star particle
      p.className = 'particle star';
      p.style.background = color;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
    } else {
      // Tiny sparkle
      p.className = 'particle';
      p.style.background = '#fff';
      p.style.width = (size * 0.6) + 'px';
      p.style.height = (size * 0.6) + 'px';
      p.style.boxShadow = `0 0 ${size}px ${color}`;
    }

    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.setProperty('--dur', dur + 's');
    p.style.setProperty('--size', size + 'px');

    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 50);
  }
}

function spawnEmojiBurst(x, y, lines) {
  const emojis = lines >= 3 ? ['✨','🌟','💖','🎀','🍬','🫧']
                             : ['✨','💫','🌸'];
  const count = Math.min(lines * 3, 12);
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `
      position: fixed; pointer-events: none; z-index: 95;
      font-size: ${14 + Math.random() * 14}px;
      left: ${x}px; top: ${y}px;
      animation: emojiBurst ${0.7 + Math.random() * 0.5}s ease-out forwards;
      --ex: ${(Math.random() - 0.5) * 120}px;
      --ey: ${-40 - Math.random() * 80}px;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1300);
  }
}

function showPreview(row, col, piece) {
  const valid = canPlace(row, col, piece.shape);
  const gridCells = document.querySelectorAll('#grid .cell');

  piece.shape.forEach(([dr, dc]) => {
    const r = row + dr, c = col + dc;
    if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) {
      const cell = gridCells[r * GRID_SIZE + c];
      if (valid) { cell.classList.add('preview'); cell.style.background = piece.color; }
      else cell.classList.add('preview-invalid');
    }
  });

  // If valid, check which lines would complete and highlight them
  if (valid) {
    // Build a temporary grid state with the piece placed
    const placed = new Set(piece.shape.map(([dr, dc]) => `${row + dr},${col + dc}`));

    const willClearRows = [];
    const willClearCols = [];

    for (let r = 0; r < GRID_SIZE; r++) {
      let full = true;
      for (let c = 0; c < GRID_SIZE; c++) {
        if (!grid[r][c] && !placed.has(`${r},${c}`)) { full = false; break; }
      }
      if (full) willClearRows.push(r);
    }

    for (let c = 0; c < GRID_SIZE; c++) {
      let full = true;
      for (let r = 0; r < GRID_SIZE; r++) {
        if (!grid[r][c] && !placed.has(`${r},${c}`)) { full = false; break; }
      }
      if (full) willClearCols.push(c);
    }

    // Highlight all cells in those lines
    willClearRows.forEach(r => {
      for (let c = 0; c < GRID_SIZE; c++) {
        gridCells[r * GRID_SIZE + c].classList.add('will-clear');
      }
    });
    willClearCols.forEach(c => {
      for (let r = 0; r < GRID_SIZE; r++) {
        gridCells[r * GRID_SIZE + c].classList.add('will-clear');
      }
    });
  }
}

function clearPreview() {
  document.querySelectorAll('#grid .cell.preview, #grid .cell.preview-invalid, #grid .cell.will-clear').forEach(cell => {
    const r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
    cell.classList.remove('preview', 'preview-invalid', 'will-clear');
    cell.style.background = grid[r][c] || '';
  });
}

function isGameOver() {
  const remaining = pieces.filter(p => !p.used);
  if (remaining.length === 0) return false;
  return remaining.every(piece => {
    for (let r = 0; r < GRID_SIZE; r++)
      for (let c = 0; c < GRID_SIZE; c++)
        if (canPlace(r, c, piece.shape)) return false;
    return true;
  });
}

// ===== SCORE & UI =====

function addScore(points) {
  score += points;
  updateScore();
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+' + points;
  popup.style.left = '50%';
  popup.style.top = '40%';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 800);
}

function updateScore() {
  document.getElementById('score').textContent = score;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('blockblast_best', bestScore);
  }
  document.getElementById('best-score').textContent = bestScore;
}

function showCombo(c) {
  const el = document.getElementById('combo-display');
  el.textContent = `${c}x COMBO!`;
  el.className = '';
  void el.offsetWidth;
  el.className = 'show';
}

function updateStreakBar() {
  document.getElementById('streak-fill').style.width = Math.min(combo * 20, 100) + '%';
}

function showGameOver() {
  document.getElementById('final-score').textContent = score;
  document.getElementById('best-score-final').textContent = `best ${bestScore}`;
  document.getElementById('game-area').classList.add('game-over-state');
  document.getElementById('game-over').classList.add('show');
}

// ===== EVENTS =====

document.addEventListener('mousemove', moveDrag);
document.addEventListener('mouseup', endDrag);
document.addEventListener('touchmove', moveDrag, { passive: false });
document.addEventListener('touchend', endDrag);
document.getElementById('restart-btn').addEventListener('click', init);
document.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('resize', () => { calcSizes(); renderPieces(); });

init();
</script>
