    {name:mpMyName,color:mpMyColor,score:0,lives:3,paddleX:BOARD_W/2-35,alive:true,ready:false}
  );
  mpDb.ref(`rooms/${mpRoomCode}/players/${mpMyPid}`).onDisconnect().remove();
  mpRoomRef=mpDb.ref(`rooms/${mpRoomCode}`);
  mpEnterWait();
};

// ── Room List ──
function mpLoadRoomList(){
  const list=document.getElementById('mpRoomList');
  const joinBtn=document.getElementById('mpBtnJoin');
  if(!list) return;
  list.innerHTML='<div class="mp-room-empty">불러오는 중...</div>';
  mpSelectedRoomCode='';
  joinBtn.classList.add('disabled');
  mpDb.ref('rooms').once('value').then(snap=>{
    const all=snap.val()||{};
    const waiting=Object.entries(all).filter(([,r])=>r.status==='waiting'&&r.title);
    if(waiting.length===0){
      list.innerHTML='<div class="mp-room-empty">참여 가능한 방이 없어요</div>';
      joinBtn.classList.add('disabled');
      return;
    }
    list.innerHTML='';
    waiting.sort((a,b)=>(b[1].created||0)-(a[1].created||0));
    waiting.forEach(([code,room])=>{
      const n=Object.keys(room.players||{}).length;
      const d=document.createElement('div');
      d.className='mp-room-item';
      d.innerHTML=`<span class="mp-room-name">${room.title}</span>
        <span class="mp-room-meta">${n}명 · 대기중</span>`;
      d.onclick=()=>{
        document.querySelectorAll('.mp-room-item').forEach(el=>el.classList.remove('selected'));
        d.classList.add('selected');
        mpSelectedRoomCode=code;
        joinBtn.classList.remove('disabled'); // 방 선택 시 활성화
      };
      list.appendChild(d);
    });
  });
}

// ── Wait Room ──
function mpEnterWait(){
  document.getElementById('mpLobby').classList.add('mp-hidden');
  document.getElementById('mpWait').classList.remove('mp-hidden');
  document.getElementById('mpWaitCode').textContent=mpRoomTitle||mpRoomCode;
  const url=location.origin+location.pathname;
  document.getElementById('mpUrlBox').textContent='공유링크: '+url;

  // 항상 먼저 숨기고 → 리스너에서 방장인 경우만 보이게
  document.getElementById('mpBtnStart').classList.add('mp-hidden');

  mpRoomRef.child('players').on('value',snap=>{
    const pl=snap.val()||{};
    mpRenderWaitList(pl);
    const n=Object.keys(pl).length;
    // mpHostId를 Firebase에서 읽어 확정 (mpIsHost 변수 의존 제거)
    const amHost = mpHostId && mpHostId===mpMyPid;
    const sb=document.getElementById('mpBtnStart');
    if(amHost){ sb.classList.remove('mp-hidden'); }
    else       { sb.classList.add('mp-hidden');    }
    document.getElementById('mpWaitHint').textContent=
      n<=1?'친구에게 코드를 알려주세요!':n+'명 참가 중 · 방장이 시작하면 게임이 시작됩니다';
    const rc=document.getElementById('mpReadyCount');
    if(rc){ rc.classList.toggle('mp-hidden',!amHost);
      if(amHost) rc.textContent=`현재 ${n}명 참가`; }
  });

  // Firebase에서 hostId 재확인 (로컬 변수 오염 방지)
  mpRoomRef.child('hostId').once('value').then(s=>{
    if(s.val()) mpHostId=s.val();
  });

  mpRoomRef.child('status').on('value',snap=>{
    if(snap.val()==='playing') mpStartGame();
  });
}
function mpRenderWaitList(players){
  const list=document.getElementById('mpPList');list.innerHTML='';
  Object.entries(players).forEach(([pid,p])=>{
    const isHost=pid===mpHostId;
    const isMe=pid===mpMyPid;
    const displayName=isMe?mpMyName:(p.name||'?');
    const d=document.createElement('div');d.className='mp-prow';
    d.innerHTML=`<div class="mp-pdot" style="background:${p.color}"></div>
      <span>${displayName}</span>
      ${isHost?'<span class="mp-badge">방장</span>':''}
      ${isMe?'<span class="mp-badge">나</span>':''}`;
    list.appendChild(d);
  });
}
document.getElementById('mpBtnStart').onclick=async()=>{
  const bd={};
  LEVEL_PATTERNS[0].forEach((row,r)=>{
    (row||'').split('').forEach((ch,c)=>{if(ch!=='.'&&ch!==' ')bd[`${r}_${c}`]=ch;});
  });
  await mpRoomRef.update({status:'playing',level:1,bricks:bd});
};
document.getElementById('mpBtnLeave').onclick=()=>{
  if(mpRoomRef){
    mpRoomRef.child(`players/${mpMyPid}`).remove();
    mpRoomRef.child('players').off();mpRoomRef.child('status').off();mpRoomRef=null;
  }
  mpIsHost=false; mpHostId=''; mpRoomCode=''; mpRoomTitle=''; // ★ 상태 초기화
  document.getElementById('mpWait').classList.add('mp-hidden');
  document.getElementById('mpLobby').classList.remove('mp-hidden');
};

// ── Game Start ──
function mpStartGame(){
  mpRoomRef.child('players').off();mpRoomRef.child('status').off();
  mpActive=true;
  document.getElementById('mpWait').classList.add('mp-hidden');
  document.getElementById('mpLobby').classList.add('mp-hidden');
  document.getElementById('mpResult').classList.add('mp-hidden');
  document.querySelector('.top-hud').style.display='none';
  document.getElementById('mpHud').style.display='flex';

  // ★ 게임 시작 시 이름·색상 Firebase 재확인 (undefined 방지)
  mpRoomRef.child(`players/${mpMyPid}`).update({
    name: mpMyName,
    color: mpMyColor,
    score: 0,
    lives: 3,
    alive: true
  });

  mpRoomRef.child('level').once('value').then(snap=>{
    level=snap.val()||1;
    mpRoomRef.child('bricks').once('value').then(bSnap=>{
      mpLoadBricks(bSnap.val()||{},level);
      lives=3;score=0;gameOver=false;won=false;paused=false;
      resetBallAndPaddle();levelTransition=null;particles=[];confetti=[];
      applyTheme();resize();mpRenderHud();
      mpSetListeners();lastTime=0;requestAnimationFrame(loop);

      // ── 5,4,3,2,1 카운트다운 ──
      mpCountdown=5;
      const ga=document.querySelector('.game-area');
      const cdWrap=document.createElement('div');
      cdWrap.id='mpCdOverlay';
      cdWrap.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:15;pointer-events:none;background:rgba(0,0,0,0.18);';
      const cdNum=document.createElement('div');
      cdNum.id='mpCdNum';
      cdNum.style.cssText='font-family:"JetBrains Mono",monospace;font-size:100px;font-weight:700;color:#fff;text-shadow:0 0 40px rgba(255,255,255,0.7);transition:transform 0.15s ease,opacity 0.15s ease;letter-spacing:-4px;';
      cdNum.textContent='5';
      cdWrap.appendChild(cdNum);
      ga.appendChild(cdWrap);

      // 첫 번째 펄스
      cdNum.style.transform='scale(1.4)';
      setTimeout(()=>{cdNum.style.transform='scale(1)';},180);

      mpCdInterval=setInterval(()=>{
        mpCountdown--;
        if(mpCountdown<=0){
          clearInterval(mpCdInterval);mpCdInterval=null;mpCountdown=0;
          cdNum.style.transform='scale(2)';
          cdNum.style.opacity='0';
          setTimeout(()=>{ const o=document.getElementById('mpCdOverlay'); if(o)o.remove(); },300);
        } else {
          cdNum.textContent=mpCountdown;
          cdNum.style.transform='scale(1.4)';
          setTimeout(()=>{cdNum.style.transform='scale(1)';},180);
        }
      },1000);
    });
  });
}

function mpLoadBricks(data,lv){
  bricks=[];
  const totalW=BOARD_W-PAD*2;
  const bw=(totalW-BRICK_GAP*(BRICK_COLS-1))/BRICK_COLS;
  const bh=18,startY=50;
  const theme=THEMES[(lv-1)%THEMES.length];
  for(let r=0;r<BRICK_ROWS;r++){
    for(let c=0;c<BRICK_COLS;c++){
      const key=`${r}_${c}`,ch=data[key];
      if(!ch) continue;
      const x=PAD+c*(bw+BRICK_GAP),y=startY+r*(bh+BRICK_GAP);
      let hp=1,type='normal',color=theme.palette[r%theme.palette.length],vx=0,powerUp=null;
      if(ch==='H'){type='hard';hp=lv>=5?3:2;color=BRICK_COLORS.hard;}
      else if(ch==='G'){type='gold';hp=Infinity;color=BRICK_COLORS.gold;}
      else if(ch==='B'){type='bomb';color=BRICK_COLORS.bomb;}
      if(lv>=4&&type==='normal'&&Math.random()<0.1) vx=Math.random()<0.5?-0.5:0.5;
      if(type!=='gold'&&Math.random()<0.22){
        powerUp=Math.random()<0.82
          ?GOOD_POWERUPS[Math.floor(Math.random()*GOOD_POWERUPS.length)]
          :BAD_POWERUPS[Math.floor(Math.random()*BAD_POWERUPS.length)];
      }
      bricks.push({x,y,w:bw,h:bh,color,type,hp,maxHp:hp,vx,powerUp,alive:true,mpKey:key});
    }
  }
}

function mpSetListeners(){
  mpBkLis=mpRoomRef.child('bricks').on('value',snap=>{
    const data=snap.val()||{};
    bricks.forEach(b=>{if(b.alive&&!data[b.mpKey])b.alive=false;});
  });
  mpPlLis=mpRoomRef.child('players').on('value',snap=>{
    mpRemotePlayers=snap.val()||{};
    mpRenderHud();
    const alive=Object.values(mpRemotePlayers).filter(p=>p.alive&&p.lives>0).length;
    if(alive===0&&mpActive) setTimeout(mpEndGame,1200);
  });
  mpLvLis=mpRoomRef.child('level').on('value',snap=>{
    const lv=snap.val();
    if(lv&&lv!==level){
      level=lv;applyTheme();
      mpRoomRef.child('bricks').once('value').then(bs=>{
        mpLoadBricks(bs.val()||{},level);resetBallAndPaddle();
      });
    }
  });
}
function mpRemoveListeners(){
  if(mpBkLis){mpRoomRef.child('bricks').off('value',mpBkLis);mpBkLis=null;}
  if(mpPlLis){mpRoomRef.child('players').off('value',mpPlLis);mpPlLis=null;}
  if(mpLvLis){mpRoomRef.child('level').off('value',mpLvLis);mpLvLis=null;}
}

// ── HUD ──
function mpRenderHud(){
  const bar=document.getElementById('mpHud');
  if(!bar||!mpActive) return;
  const all={...mpRemotePlayers,[mpMyPid]:{name:mpMyName,color:mpMyColor,score,lives,alive:lives>0}};

  // 최고점 계산
  const maxScore=Math.max(...Object.values(all).map(p=>p.score||0));

  bar.innerHTML='';
  Object.entries(all).forEach(([pid,p])=>{
    const isMe=pid===mpMyPid;
    const isTop=(p.score||0)===maxScore&&maxScore>0;
    const dead=!p.alive||p.lives<=0;
    const displayName=isMe?mpMyName:(p.name||'?'); // 내 이름은 로컬값 우선

    // 점수 색상: 1등=골드, 나=밝은흰색, 타인=회색
    const scoreColor = isTop ? '#ffd700' : isMe ? '#ffffff' : 'rgba(255,255,255,0.38)';
    // 이름 색상: 나=밝게, 타인=흐리게
    const nameColor = isMe ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';

    const d=document.createElement('div');
    d.className='mp-hp'+(isMe?' me':'')+(dead?' dead':'');
    const h='♥'.repeat(Math.max(0,p.lives||0));
    d.innerHTML=`<div class="mp-dot" style="background:${p.color};${isMe?'box-shadow:0 0 5px '+p.color:''}"></div>
      <div class="mp-nm" style="color:${nameColor}">${displayName}</div>
      <div class="mp-sc" style="color:${scoreColor};${isTop?'text-shadow:0 0 8px rgba(255,215,0,0.5)':''}">${(p.score||0).toLocaleString()}</div>
      <div class="mp-lv" style="color:${isMe?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.18)'}">${h}</div>`;
    bar.appendChild(d);
  });
  if(canvas) bar.style.width=canvas.width+'px';
}

// ── Remote paddles ──
function mpDrawRemotePaddles(){
  Object.entries(mpRemotePlayers).forEach(([pid,p])=>{
    if(pid===mpMyPid||!p.alive||p.lives<=0) return;
    const px=(p.paddleX??BOARD_W/2-35);
    ctx.save();
    ctx.globalAlpha=0.5;ctx.fillStyle=p.color;
    roundedPath(px,paddle.y,paddle.w,paddle.h,paddle.h*0.45);ctx.fill();
    ctx.globalAlpha=0.7;ctx.font='bold 7px Inter,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillStyle='#fff';
    ctx.fillText(p.name,px+paddle.w/2,paddle.y-3);
    ctx.restore();
  });
}

// ── OUT overlay ──
function mpShowOutOverlay(){
  const ov=document.getElementById('overlay');
  ov.innerHTML='OUT! 💀<div class="sub">다른 플레이어를 응원하세요 👏</div>';
  ov.style.display='block';
}

// ── Game End ──
function mpEndGame(){
  if(!mpActive) return;
  mpActive=false;mpRemoveListeners();
  const ov=document.getElementById('overlay');if(ov)ov.style.display='none';
  mpRoomRef.child('players').once('value').then(snap=>{
    const sorted=Object.values(snap.val()||{}).sort((a,b)=>(b.score||0)-(a.score||0));
    mpShowResult(sorted);
  });
}
function mpShowResult(sorted){
  const rankStyle=[
    'background:#f5c842;color:#7a5c00',
    'background:#d0d0d8;color:#555',
    'background:#d4926a;color:#6b3a1f',
  ];
  document.getElementById('mpRList').innerHTML=sorted.map((p,i)=>`
    <div class="mp-rrow">
      <div class="mp-rn" style="font-size:11px;font-weight:800;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;${rankStyle[i]||'background:rgba(160,130,200,0.15);color:#3d2f6a'}">${i+1}</div>
      <div class="mp-rdot" style="background:${p.color}"></div>
      <div class="mp-rname">${p.name||'?'}${p.name===mpMyName?'<span style="opacity:.35;font-size:9px"> (나)</span>':''}</div>
      <div class="mp-rsc">${(p.score||0).toLocaleString()}</div>
    </div>`).join('');
  document.getElementById('mpResultSub').textContent=`LV.${level} · ${sorted.length}명 플레이`;
  document.getElementById('mpResult').classList.remove('mp-hidden');
  document.querySelector('.top-hud').style.display='none';
  document.getElementById('mpHud').style.display='none';
}
document.getElementById('mpBtnReplay').onclick=()=>{
  if(mpRoomRef){mpRoomRef.child(`players/${mpMyPid}`).remove();mpRoomRef=null;}
  mpRoomCode='';mpIsHost=false;mpHostId='';level=1;
  document.getElementById('mpResult').classList.add('mp-hidden');
  mpShowLobby();
};
</script>
