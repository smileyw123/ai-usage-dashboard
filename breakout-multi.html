function spawnConfetti() {
  const pastel = ['#f2b5d4','#f7e1a1','#a8d8cb','#a8c8e8','#c5a8e0','#f4b8a8','#b5dbb5','#ffe87a'];
  for (let i=0;i<80;i++) {
    confetti.push({
      x: BOARD_W/2 + (Math.random()-0.5)*60,
      y: BOARD_H/2,
      vx: (Math.random()-0.5)*8,
      vy: -5 - Math.random()*6,
      life: 2.5 + Math.random()*1,
      age: 0,
      size: 3 + Math.random()*4,
      color: pastel[Math.floor(Math.random()*pastel.length)],
      spin: (Math.random()-0.5)*10,
      shape: Math.random()<0.33?'star':(Math.random()<0.5?'heart':'rect')
    });
  }
}

function drawStar(cx, cy, size) {
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const r = i%2===0 ? size : size*0.4;
    const a = (i*Math.PI/5) - Math.PI/2;
    const px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r;
    if (i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
}

function drawHeart(cx, cy, size) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + size*0.3);
  ctx.bezierCurveTo(cx, cy - size*0.3, cx - size*0.8, cy - size*0.3, cx - size*0.8, cy + size*0.1);
  ctx.bezierCurveTo(cx - size*0.8, cy + size*0.5, cx, cy + size*0.8, cx, cy + size);
  ctx.bezierCurveTo(cx, cy + size*0.8, cx + size*0.8, cy + size*0.5, cx + size*0.8, cy + size*0.1);
  ctx.bezierCurveTo(cx + size*0.8, cy - size*0.3, cx, cy - size*0.3, cx, cy + size*0.3);
  ctx.closePath(); ctx.fill();
}

function updateParticles(dt) {
  particles = particles.filter(p => {
    p.age += dt;
    if (p.age >= p.life) return false;
    p.x += p.vx; p.y += p.vy;
    const g = p.gravity == null ? 0.15 : p.gravity;
    p.vy += g;
    // horizontal wobble for petals/bubbles/notes
    if (p.type === 'bubble' || p.type === 'petal' || p.type === 'note') {
      p.wobble = (p.wobble || 0) + 0.2;
      p.x += Math.sin(p.wobble) * 0.3;
    }
    return true;
  });
  confetti = confetti.filter(p => {
    p.age += dt;
    if (p.age >= p.life) return false;
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.vx *= 0.99;
    return true;
  });
}

function drawParticles() {
  for (const p of particles) {
    const lifeT = p.age / p.life;
    const alpha = 1 - lifeT*lifeT;
    const size = p.size * (1 - lifeT*0.3);
    ctx.save();
    ctx.globalAlpha = alpha * 0.95;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.spin * p.age);
    ctx.fillStyle = p.color;

    switch (p.type) {
      case 'heart':
        drawHeart(0, -size*0.3, size);
        break;
      case 'rect':
        ctx.fillRect(-(p.w||5)/2, -(p.h||3)/2, p.w||5, p.h||3);
        break;
      case 'bubble': {
        // translucent bubble with highlight
        ctx.globalAlpha = alpha * 0.6;
        const bg = ctx.createRadialGradient(-size*0.3, -size*0.3, 0, 0, 0, size);
        bg.addColorStop(0, 'rgba(255,255,255,0.7)');
        bg.addColorStop(0.6, p.color);
        bg.addColorStop(1, 'rgba(255,255,255,0.1)');
        ctx.fillStyle = bg;
        ctx.beginPath();ctx.arc(0,0,size,0,Math.PI*2);ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();ctx.arc(-size*0.3, -size*0.3, size*0.25, 0, Math.PI*2);ctx.fill();
        break;
      }
      case 'sparkle': {
        // diamond sparkle
        ctx.beginPath();
        ctx.moveTo(0, -size); ctx.lineTo(size*0.4, 0);
        ctx.lineTo(0, size); ctx.lineTo(-size*0.4, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath();
        ctx.moveTo(0, -size*0.7); ctx.lineTo(size*0.15, 0);
        ctx.lineTo(0, size*0.7); ctx.lineTo(-size*0.15, 0);
        ctx.closePath(); ctx.fill();
        break;
      }
      case 'petal': {
        ctx.beginPath();
        ctx.ellipse(0, 0, size*0.5, size, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.beginPath();
        ctx.ellipse(-size*0.1, -size*0.2, size*0.2, size*0.4, 0, 0, Math.PI*2);
        ctx.fill();
        break;
      }
      case 'bolt': {
        // electric bolt - zigzag line
        ctx.rotate(p.angle || 0);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(size*0.4, -size*0.3);
        ctx.lineTo(size*0.8, size*0.2);
        ctx.lineTo(size*1.4, -size*0.2);
        ctx.stroke();
        break;
      }
      case 'flash': {
        const fg = ctx.createRadialGradient(0,0,0,0,0,size);
        fg.addColorStop(0, 'rgba(255,255,255,0.9)');
        fg.addColorStop(0.5, 'rgba(255,255,255,0.4)');
        fg.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = fg;
        ctx.fillRect(-size, -size, size*2, size*2);
        break;
      }
      case 'shard': {
        // ice shard - triangle crystal
        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.lineTo(size*0.5, size*0.5);
        ctx.lineTo(-size*0.5, size*0.5);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;
      }
      case 'note': {
        // music note: oval head + stem
        ctx.beginPath();
        ctx.ellipse(0, size*0.3, size*0.55, size*0.4, -0.3, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = p.color;
        ctx.lineWidth = size*0.25;
        ctx.beginPath();
        ctx.moveTo(size*0.5, size*0.3);
        ctx.lineTo(size*0.5, -size*0.9);
        ctx.stroke();
        // flag
        ctx.beginPath();
        ctx.moveTo(size*0.5, -size*0.9);
        ctx.quadraticCurveTo(size*1.2, -size*0.7, size*1.1, -size*0.2);
        ctx.lineWidth = size*0.2;
        ctx.stroke();
        break;
      }
      case 'star':
      default:
        drawStar(0, 0, size);
    }
    ctx.restore();
  }
}

function drawConfetti() {
  for (const p of confetti) {
    const lifeT = p.age / p.life;
    const alpha = Math.max(0, 1 - (lifeT-0.6)*2.5);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.spin * p.age);
    ctx.fillStyle = p.color;
    if (p.shape==='star') drawStar(0, 0, p.size);
    else if (p.shape==='heart') drawHeart(0, -p.size*0.3, p.size);
    else {
      ctx.fillRect(-p.size*0.6, -p.size*0.4, p.size*1.2, p.size*0.8);
    }
    ctx.restore();
  }
}

// ==== powerup items (falling) ====
// ── 파워업 벡터 아이콘 (좌표 원점=중앙, s=반경) ──
function drawPowerUpIcon(type, s) {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = s * 0.18;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (type) {

    case 'L': { // 레이저 — 포신 + 빔 두 줄
      const bw = s*0.22, bh = s*1.3;
      ctx.fillRect(-bw/2, -s*0.55, bw, bh*0.5); // 포신
      ctx.globalAlpha *= 0.6;
      ctx.fillRect(-s*0.55, -s*0.1, s*1.1, s*0.12); // 빔
      ctx.fillRect(-s*0.55,  s*0.2, s*1.1, s*0.12);
      ctx.globalAlpha = ctx.globalAlpha / 0.6;
      break;
    }

    case 'E': { // 확장 — 양방향 화살표 ←→
      const aw = s*0.55, ah = s*0.28;
      ctx.beginPath();
      // 왼쪽 화살
      ctx.moveTo(-aw, 0); ctx.lineTo(-aw+ah, -ah); ctx.moveTo(-aw, 0); ctx.lineTo(-aw+ah, ah);
      ctx.moveTo(-aw, 0); ctx.lineTo(aw, 0); // 중앙 선
      // 오른쪽 화살
      ctx.lineTo(aw-ah, -ah); ctx.moveTo(aw, 0); ctx.lineTo(aw-ah, ah);
      ctx.stroke();
      break;
    }

    case 'C': { // 캐치 — U자 자석 + 양 끝 극
      ctx.lineWidth = s * 0.22;
      ctx.beginPath();
      ctx.arc(0, -s*0.05, s*0.5, Math.PI, 0, false);
      ctx.stroke();
      // 극 (빨강/파랑 대신 밝게)
      ctx.lineWidth = s*0.22;
      ctx.beginPath(); ctx.moveTo(-s*0.5, -s*0.05); ctx.lineTo(-s*0.5, s*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( s*0.5, -s*0.05); ctx.lineTo( s*0.5, s*0.4); ctx.stroke();
      break;
    }

    case 'S': { // 슬로우 — 시계 + 짧은 바늘
      ctx.lineWidth = s*0.14;
      ctx.beginPath(); ctx.arc(0, 0, s*0.55, 0, Math.PI*2); ctx.stroke();
      ctx.lineWidth = s*0.18;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -s*0.38); ctx.stroke(); // 긴 바늘
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(s*0.22, s*0.1); ctx.stroke(); // 짧은 바늘
      // 12시 눈금
      ctx.lineWidth = s*0.12;
      ctx.beginPath(); ctx.moveTo(0, -s*0.52); ctx.lineTo(0, -s*0.65); ctx.stroke();
      break;
    }

    case 'D': { // 분열 — 위에서 아래 두 줄로 갈라짐
      ctx.beginPath();
      ctx.moveTo(0, -s*0.6);
      ctx.lineTo(0, -s*0.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, -s*0.1); ctx.lineTo(-s*0.45, s*0.55);
      ctx.moveTo(0, -s*0.1); ctx.lineTo( s*0.45, s*0.55);
      ctx.stroke();
      // 끝 점
      ctx.beginPath(); ctx.arc(-s*0.45, s*0.55, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc( s*0.45, s*0.55, s*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -s*0.6, s*0.1, 0, Math.PI*2); ctx.fill();
      break;
    }

    case 'M': { // 멀티볼 — 원 3개
      const r2 = s*0.28;
      [[0,-s*0.42],[-s*0.4,s*0.28],[s*0.4,s*0.28]].forEach(([x,y]) => {
        ctx.beginPath(); ctx.arc(x, y, r2, 0, Math.PI*2); ctx.fill();
      });
      break;
    }

    case 'P': { // 1UP — 하트
      ctx.beginPath();
      ctx.moveTo(0, s*0.5);
      ctx.bezierCurveTo(-s*1.1, -s*0.1, -s*1.1, -s*0.9, 0, -s*0.3);
      ctx.bezierCurveTo( s*1.1, -s*0.9,  s*1.1, -s*0.1, 0, s*0.5);
      ctx.fill();
      break;
    }

    case 'F': { // 파이어볼 — 불꽃 실루엣
      ctx.beginPath();
      ctx.moveTo(0, -s*0.75);
      ctx.bezierCurveTo( s*0.5, -s*0.4,  s*0.7,  s*0.1, s*0.35, s*0.6);
      ctx.bezierCurveTo( s*0.15, s*0.82,  -s*0.15, s*0.82, -s*0.35, s*0.6);
      ctx.bezierCurveTo(-s*0.7,  s*0.1, -s*0.5, -s*0.4, 0, -s*0.75);
      ctx.fill();
      // 내부 밝은 코어
      ctx.globalAlpha *= 0.5;
      ctx.fillStyle = 'rgba(255,255,255,1)';
      ctx.beginPath();
      ctx.ellipse(0, s*0.12, s*0.18, s*0.3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = ctx.globalAlpha / 0.5;
      break;
    }

    case 'T': { // 번개 — 지그재그 볼트
      ctx.beginPath();
      ctx.moveTo( s*0.18, -s*0.75);
      ctx.lineTo(-s*0.12,  s*0.0);
      ctx.lineTo( s*0.22,  s*0.0);
      ctx.lineTo(-s*0.18,  s*0.75);
      ctx.lineWidth = s*0.22;
      ctx.stroke();
      break;
    }

    case 'K': { // 캐리어 — 유선형 선체 + 날개
      // 선체
      ctx.beginPath();
      ctx.moveTo(0, -s*0.7);
      ctx.lineTo( s*0.45, s*0.3);
      ctx.lineTo( s*0.45, s*0.6);
      ctx.lineTo(-s*0.45, s*0.6);
      ctx.lineTo(-s*0.45, s*0.3);
      ctx.closePath(); ctx.fill();
      // 날개
      ctx.beginPath();
      ctx.moveTo(-s*0.45, s*0.1);
      ctx.lineTo(-s*0.95, s*0.6);
      ctx.lineTo(-s*0.45, s*0.5);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo( s*0.45, s*0.1);
      ctx.lineTo( s*0.95, s*0.6);
      ctx.lineTo( s*0.45, s*0.5);
      ctx.closePath(); ctx.fill();
      // 엔진 구멍
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      [-s*0.22, 0, s*0.22].forEach(x => {
        ctx.beginPath(); ctx.arc(x, s*0.45, s*0.09, 0, Math.PI*2); ctx.fill();
      });
      break;
    }

    case 'X': { // 축소 — 안쪽 화살표 →←
      const aw = s*0.55, ah = s*0.28;
      ctx.beginPath();
      ctx.moveTo(-aw, -s*0.1); ctx.lineTo(0, -s*0.1);
      ctx.moveTo(-aw+ah, -s*0.1-ah); ctx.lineTo(-aw, -s*0.1); ctx.lineTo(-aw+ah, -s*0.1+ah);
      ctx.moveTo(aw, s*0.1); ctx.lineTo(0, s*0.1);
      ctx.moveTo(aw-ah, s*0.1-ah); ctx.lineTo(aw, s*0.1); ctx.lineTo(aw-ah, s*0.1+ah);
      ctx.stroke();
      break;
    }

    case 'H': { // 가속 — 겹친 오른쪽 화살표 >>>
      const gap = s*0.32;
      [-gap, 0, gap].forEach(ox => {
        ctx.beginPath();
        ctx.moveTo(ox - s*0.22, -s*0.45);
        ctx.lineTo(ox + s*0.22,  0);
        ctx.lineTo(ox - s*0.22,  s*0.45);
        ctx.stroke();
      });
      break;
    }
  }
}

function drawPowerUp(pu) {
  const def = POWERUPS[pu.type];
  const cx = pu.x, cy = pu.y;
  const rad = 13;
  pu.t = (pu.t || 0) + 1;
  const pulse = 1 + Math.sin(pu.t * 0.12) * 0.1;
  const spinAngle = pu.t * 0.05;
  const hoverY = Math.sin(pu.t * 0.15) * 1.5;

  const {r, g, b} = hexToRgb(def.color);

  ctx.save();
  ctx.translate(cx, cy + hoverY);

  // outer pulsing halo
  const haloRad = rad * 1.8 * pulse;
  const haloGrad = ctx.createRadialGradient(0, 0, rad*0.5, 0, 0, haloRad);
  haloGrad.addColorStop(0, `rgba(${r},${g},${b},0.4)`);
  haloGrad.addColorStop(0.6, `rgba(${r},${g},${b},0.15)`);
  haloGrad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = haloGrad;
  ctx.fillRect(-haloRad, -haloRad, haloRad*2, haloRad*2);

  // rotating sparkle ring (4 small stars around)
  for (let i = 0; i < 4; i++) {
    const a = spinAngle + (i * Math.PI / 2);
    const sx = Math.cos(a) * rad * 1.3;
    const sy = Math.sin(a) * rad * 1.3;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(a);
    ctx.fillStyle = `rgba(255,255,255,${0.6 + Math.sin(pu.t*0.2 + i)*0.3})`;
    drawStar(0, 0, 2.5);
    ctx.restore();
  }

  // gem body (rounded with gradient)
  // base glow
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 8;

  // body gradient - gem-like
  const bodyGrad = ctx.createRadialGradient(-rad*0.3, -rad*0.3, 0, 0, 0, rad);
  bodyGrad.addColorStop(0, `rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)},1)`);
  bodyGrad.addColorStop(0.5, def.color);
  bodyGrad.addColorStop(1, `rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},1)`);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(0, 0, rad * pulse * 0.95, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // inner shine band (rotating)
  ctx.save();
  ctx.rotate(spinAngle * 0.5);
  ctx.beginPath();
  ctx.arc(0, 0, rad * 0.95, 0, Math.PI*2);
  ctx.clip();
  const shineGrad = ctx.createLinearGradient(-rad, -rad, rad, rad);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0)');
  shineGrad.addColorStop(0.4, 'rgba(255,255,255,0)');
  shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.4)');
  shineGrad.addColorStop(0.6, 'rgba(255,255,255,0)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(-rad, -rad, rad*2, rad*2);
  ctx.restore();

  // top-left specular
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(-rad*0.35, -rad*0.35, rad*0.22, 0, Math.PI*2);
  ctx.fill();

  // ring outline
  ctx.strokeStyle = `rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},0.7)`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, rad * pulse * 0.95, 0, Math.PI*2);
  ctx.stroke();

  // 벡터 아이콘
  ctx.save();
  drawPowerUpIcon(pu.type, rad * 0.62);
  ctx.restore();

  ctx.restore();

  // spawn sparkle trail particles occasionally
  if (Math.random() < 0.35) {
    particles.push({
      x: cx + (Math.random()-0.5)*rad*1.4,
      y: cy - rad*0.5,
      vx: (Math.random()-0.5)*0.8,
      vy: -0.3 - Math.random()*0.8,
      life: 0.4 + Math.random()*0.3,
      age: 0,
      size: 1.5 + Math.random()*2,
      color: def.color,
      spin: (Math.random()-0.5)*5,
      type: 'star'
    });
  }
}

function applyPowerUp(type) {
  const def = POWERUPS[type];
  switch (type) {
    case 'L':
      paddleState.laser = 600;
      paddleState.laserTransform = 1.8;
      paddleState.catch = 0; // 레이저 작동 시 캐치 해제
      // 이유 불문하고 붙어있는 공 모두 즉시 발사
      for (const b of balls) {
        if (b.stuck) {
          const spd = currentBallSpeed();
          const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
          b.vx = Math.cos(ang) * spd;
          b.vy = Math.sin(ang) * spd;
          b.stuck = false; b.launched = true;
        }
      }
      sfxPlay('laser_transform');
      break;
    case 'E':
      if (paddleState.shrink > 0) paddleState.shrink = 0;
      paddleState.expand = 1;
      paddle.w = 110;
      break;
    case 'C': paddleState.catch = 5; break;  // 5번 잡기
    case 'S': paddleState.slow = 1; paddleState.fast = 0; for (const b of balls) applyBallSpeed(b); break;
    case 'D': {
      const newBalls = [];
      for (const b of balls) {
        if (b.stuck) continue;
        const spd = Math.hypot(b.vx, b.vy);
        const baseAngle = Math.atan2(b.vy, b.vx);
        for (let k=-1; k<=1; k++) {
          const a = baseAngle + k*0.4;
          newBalls.push({ ...b, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd });
        }
      }
      if (newBalls.length) balls = newBalls;
      break;
    }
    case 'M': {
      const active = balls.filter(b=>!b.stuck);
      if (active.length) {
        const src = active[0];
        balls.push({ ...src, vx: -src.vx, vy: src.vy });
        balls.push({ ...src, vx: src.vy, vy: -src.vx });
      }
      break;
    }
    case 'P': lives++; updateStats(); break;
    case 'F': paddleState.fire = 1000; sfxPlay('fire'); break;
    case 'T': fireThunder(); break;
    case 'K':
      // 공을 천천히 패들로 유도 (극저속)
      paddleState.carrier = 1;
      paddleState.carrierTransform = 2.0;
      paddleState.laser = 0;       // 로봇 → 캐리어 전환
      paddleState.laserTransform = 0;
      laserFireTimer = 0;
      for (const b of balls) {
        // stuck 볼도 포함 — 전부 착륙 플래그 설정
        b._carrierLanding = true;
        b.stuck = false; // 혹시 붙어있으면 해제해서 유도 로직 타게
        b.launched = true;
        if (Math.hypot(b.vx, b.vy) < 0.1) {
          // 멈춰있는 볼엔 초기 속도 부여
          const dx = (paddle.x + paddle.w/2) - b.x;
          const dy = (paddle.y - b.r - 2) - b.y;
          const dist = Math.hypot(dx, dy) || 1;
          b.vx = (dx / dist) * 2;
          b.vy = (dy / dist) * 2;
        }
      }
      sfxPlay('carrier_warp');
      break;
    case 'X':
      if (paddleState.expand > 0) paddleState.expand = 0;
      paddleState.shrink = 1;
      paddle.w = 45;
      break;
    case 'H': paddleState.fast = 1; paddleState.slow = 0; for (const b of balls) applyBallSpeed(b); break;
  }
  // 사운드: 전용 사운드가 없는 아이템만 일반 사운드
  if (type !== 'T' && type !== 'L' && type !== 'F' && type !== 'K') sfxPlay(def.bad ? 'bad_powerup' : 'powerup');
  // floating notification + toast
  spawnParticles(paddle.x + paddle.w/2, paddle.y, def.color, 10);
  showPowerToast(type);
  updatePowerDisplay();
}

// ====== REFINED SOUND ENGINE ======
let _sfxCtx = null, _sfxDest = null;

function getSfxCtx() {
  if (!_sfxCtx) {
    try {
      _sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
      const comp = _sfxCtx.createDynamicsCompressor();
      comp.threshold.value = -18; comp.knee.value = 12;
      comp.ratio.value = 5; comp.attack.value = 0.002; comp.release.value = 0.12;
      comp.connect(_sfxCtx.destination);
      _sfxDest = comp;
    } catch(e) { return null; }
  }
  return _sfxCtx;
}

// 모든 터치/클릭마다 resume 시도 (once 제거 — 첫 번째가 타이밍 문제로 실패해도 다음에 복구)
function _unlockAudio() {
  const c = getSfxCtx();
  if (c && c.state === 'suspended') c.resume().catch(() => {});
}
document.addEventListener('touchstart', _unlockAudio, { passive: true });
document.addEventListener('touchend',   _unlockAudio, { passive: true });
document.addEventListener('click',      _unlockAudio);

// 오실레이터 헬퍼: linear attack + exponential decay
function _osc(ctx, dest, now, type, freq, vol, attack, decay, freqEnd) {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, now);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, now + attack + decay);
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(vol, now + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, now + attack + decay);
  o.connect(g); g.connect(dest);
  o.start(now); o.stop(now + attack + decay + 0.05);
}

// 노이즈 헬퍼: white noise + optional lowpass / highpass
function _noise(ctx, dest, now, vol, dur, lp, hp) {
  const len = Math.ceil(ctx.sampleRate * Math.min(dur + 0.05, 2));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
  let node = src;
  if (lp) { const f = ctx.createBiquadFilter(); f.type='lowpass';  f.frequency.value=lp; node.connect(f); node=f; }
  if (hp) { const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; node.connect(f); node=f; }
  node.connect(g); g.connect(dest);
  src.start(now); src.stop(now + dur + 0.05);
}

function sfxPlay(type) {
  const ctx = getSfxCtx(); if (!ctx) return;
  if (ctx.state === 'suspended') {
    // resume 완료 후 즉시 재생 (소리를 버리지 않음)
    ctx.resume().then(() => _sfxPlayNow(type)).catch(() => {});
    return;
  }
  if (ctx.state !== 'running') return;
  _sfxPlayNow(type);
}

function _sfxPlayNow(type) {
  const ctx = getSfxCtx(); if (!ctx || ctx.state !== 'running') return;
  const D = _sfxDest || ctx.destination;
  const T = ctx.currentTime;
  try {
    switch (type) {

      case 'paddle':
        // 통통 튀는 팝 — G5에서 G4로 밝게 하강
        _osc(ctx, D, T, 'sine', 784,  0.30, 0.003, 0.09, 392);
        _osc(ctx, D, T, 'sine', 1568, 0.08, 0.002, 0.04);
        break;

      case 'wall':
        // 가볍고 밝은 "틱"
        _osc(ctx, D, T, 'sine', 1047, 0.15, 0.001, 0.032);
        break;

      case 'brick':
        // 버블 팝 — 높은 음 + 하이패스 노이즈
        _osc(ctx, D, T, 'sine', 880, 0.22, 0.002, 0.08, 440);
        _noise(ctx, D, T, 0.14, 0.07, undefined, 2000);
        break;

      case 'brick_hard':
        // 실로폰 "팅" — 두 배음
        _osc(ctx, D, T, 'sine', 1047, 0.18, 0.001, 0.10, 784);
        _osc(ctx, D, T, 'sine', 1568, 0.07, 0.001, 0.06);
        break;

      case 'bomb':
        // 카툰 붐 — 낮지만 경쾌하게
        _osc(ctx, D, T,       'sine', 220, 0.38, 0.005, 0.28, 55);
        _noise(ctx, D, T,              0.22, 0.18, 600);
        _osc(ctx, D, T+0.04,  'sine', 440, 0.14, 0.003, 0.10, 110);
        break;

      case 'powerup': {
        // ✨ C5→E5→G5→C6 반짝반짝 밝은 아르페지오
        const dt = 0.075;
        _osc(ctx, D, T,        'sine',  523, 0.22, 0.003, 0.13);
        _osc(ctx, D, T+dt,     'sine',  659, 0.22, 0.003, 0.13);
        _osc(ctx, D, T+dt*2,   'sine',  784, 0.22, 0.003, 0.13);
        _osc(ctx, D, T+dt*3,   'sine', 1047, 0.30, 0.003, 0.24);
        _osc(ctx, D, T+dt*3,   'sine', 2093, 0.08, 0.002, 0.10);
        break;
      }

      case 'bad_powerup':
        // 코믹 하강 — 장난스러운 "뿅"
        _osc(ctx, D, T,      'sine', 523, 0.20, 0.003, 0.10, 330);
        _osc(ctx, D, T+0.10, 'sine', 330, 0.18, 0.003, 0.16, 196);
        break;

      case 'life_lost':
        // 부드러운 3단 하강 — 너무 슬프지 않게
        _osc(ctx, D, T,      'sine', 659, 0.26, 0.006, 0.22, 523);
        _osc(ctx, D, T+0.14, 'sine', 523, 0.23, 0.006, 0.26, 392);
        _osc(ctx, D, T+0.28, 'sine', 392, 0.20, 0.006, 0.30, 294);
        break;

      case 'level_up': {
        // 🎉 경쾌한 팡파르 C5-E5-G5-C6 + 5도 화음
        const n = [523, 659, 784, 1047];
        n.forEach((f, i) => _osc(ctx, D, T+i*0.08, 'sine', f, i===3?0.36:0.24, 0.004, i===3?0.36:0.12));
        _osc(ctx, D, T+0.24, 'sine', 1568, 0.12, 0.004, 0.22);
        break;
      }

      case 'thunder': {
        // ⚡ 밝은 전기 크랙 + 사인 저음 + 잔향
        _noise(ctx, D, T,        0.42, 0.07, undefined, 1200);
        _osc(ctx,  D, T,        'sine', 110, 0.36, 0.005, 0.55, 55);
        _noise(ctx, D, T+0.05,  0.26, 0.40, 1000);
        _noise(ctx, D, T+0.50,  0.14, 1.6, 3000, 800);
        _noise(ctx, D, T+1.10,  0.09, 1.2, 2000, 600);
        _noise(ctx, D, T+1.80,  0.06, 0.9, 1500, 400);
        break;
      }

      case 'fire':
        // 🔥 불꽃 점화 — 따뜻한 어택 + 크랙클
        _noise(ctx, D, T,        0.28, 0.20, 1200, 250);
        _osc(ctx,  D, T,        'sine', 160, 0.22, 0.015, 0.30, 80);
        _noise(ctx, D, T+0.10,  0.20, 0.25, 700, 180);
        _osc(ctx,  D, T+0.15,   'sine', 220, 0.12, 0.01, 0.20, 110);
        break;

      case 'laser_transform':
        // 🤖 기계 변신 — 상승하는 스퀘어파 연속 + 완성 핑
        _osc(ctx, D, T,        'square', 180, 0.11, 0.01, 0.07, 360);
        _osc(ctx, D, T+0.08,   'square', 260, 0.11, 0.01, 0.07, 520);
        _osc(ctx, D, T+0.16,   'square', 360, 0.11, 0.01, 0.07, 720);
        _osc(ctx, D, T+0.24,   'square', 480, 0.13, 0.01, 0.08, 960);
        _noise(ctx, D, T+0.28, 0.14, 0.18, 3500, 700);
        _osc(ctx, D, T+0.32,   'sine',   880, 0.20, 0.005, 0.20);
        _osc(ctx, D, T+0.32,   'sine',  1320, 0.08, 0.005, 0.14);
        break;

      case 'carrier_warp':
        // 🛸 프로토스 캐리어 워프인 — 사이오닉 에너지 상승 후 묵직한 엔진음
        _osc(ctx, D, T,        'sine',  220, 0.08, 0.20, 1.2, 440); // 워프 상승
        _osc(ctx, D, T,        'sine',  330, 0.06, 0.20, 1.2, 660);
        _osc(ctx, D, T,        'sine',  440, 0.06, 0.20, 1.2, 880);
        _noise(ctx, D, T+0.15, 0.12, 0.6, 2000, 500);               // 에너지 스파크
        // 캐리어 엔진 — 깊고 웅장한 저음
        _osc(ctx, D, T+0.6,   'sine',   60,  0.32, 0.10, 1.0);
        _osc(ctx, D, T+0.6,   'sine',   90,  0.18, 0.10, 1.0);
        _osc(ctx, D, T+0.7,   'sine',  120,  0.14, 0.08, 0.8);
        // 사이오닉 글래스 핑
        _osc(ctx, D, T+0.8,   'sine', 1320, 0.14, 0.006, 0.40);
        _osc(ctx, D, T+0.85,  'sine', 1760, 0.10, 0.006, 0.30);
        _osc(ctx, D, T+0.9,   'sine', 2200, 0.08, 0.006, 0.25);
        break;

      case 'interceptor_launch':
        // 🚀 인터셉터 발진 — 짧고 날카로운 워프 사운드
        _osc(ctx, D, T,       'sine', 880, 0.12, 0.004, 0.08, 440);
        _osc(ctx, D, T,       'sine',1760, 0.06, 0.003, 0.05);
        break;

      case 'interceptor_hit':
        // 💥 인터셉터 명중 — 크리스탈 타격음
        _osc(ctx, D, T,       'sine', 1046, 0.14, 0.002, 0.07, 523);
        _noise(ctx, D, T,              0.10, 0.06, 4000, 1500);
        break;
    }
  } catch(e) {}
}

// ====== THUNDER POWER-UP ======
function generateZigzag(startX, fromY, toY) {
  const segs = [];
  let x = startX, y = fromY;
  while (y > toY) {
    // 세그먼트를 더 촘촘하게 → 더 자세한 번개
    const ny = Math.max(toY, y - 7 - Math.random() * 11);
    const nx = Math.max(4, Math.min(BOARD_W - 4, x + (Math.random() - 0.5) * 28));
    segs.push({ x1: x, y1: y, x2: nx, y2: ny });
    x = nx; y = ny;
  }
  return segs;
}

function boltHitsBrick(segs, brick) {
  const bmy = brick.y + brick.h * 0.5;
  for (const s of segs) {
    const lo = Math.min(s.y1, s.y2), hi = Math.max(s.y1, s.y2);
    if (bmy < lo || bmy > hi) continue;
    const dY = s.y2 - s.y1;
    const t = Math.abs(dY) < 0.1 ? 0.5 : (bmy - s.y1) / dY;
    const bx = s.x1 + t * (s.x2 - s.x1);
    if (bx >= brick.x - 4 && bx <= brick.x + brick.w + 4) return true;
  }
  return false;
}

function fireThunder() {
  sfxPlay('thunder');
  const count = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const startX = PAD + 5 + ((BOARD_W - PAD * 2 - 10) * (i + 0.5 + (Math.random() - 0.5) * 0.5) / count);
    const segs = generateZigzag(startX, paddle.y, 0);
    for (const brick of bricks) {
      if (!brick.alive || brick.type === 'gold') continue;
      if (boltHitsBrick(segs, brick)) {
        damageBrick(brick, 99, false);
        spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, '#ffe87a', 6);
      }
    }
    // 볼트 지속시간 2.2~3.2초, 고유 seed로 제각각 깜빡임
    thunderBolts.push({
      segs,
      age: -i * 0.05,
      life: 2.2 + Math.random() * 1.0,
      seed: Math.random() * 100
    });
  }
  particles.push({ x: BOARD_W/2, y: BOARD_H/3, vx:0, vy:0, life:0.18, age:0, size:30, color:'#fffcb0', spin:0, gravity:0, type:'flash' });
}

function drawThunderBolts() {
  for (const bolt of thunderBolts) {
    if (bolt.age < 0 || !bolt.segs.length) continue;
    const t = bolt.age / bolt.life;

    // 깜빡임: 고주파 sin 두 개를 곱해 자연스러운 전기 깜빡임
    const flicker = (0.5 + 0.5 * Math.sin(bolt.age * 22 + bolt.seed))
                  * (0.5 + 0.5 * Math.sin(bolt.age * 37 + bolt.seed * 1.4));
    // 페이드 인/아웃 (앞 8%, 뒤 20%)
    const fade = t < 0.08 ? t / 0.08 : (t > 0.80 ? Math.max(0, 1 - (t - 0.80) / 0.20) : 1.0);
    const alpha = Math.max(0, fade * (0.35 + 0.65 * flicker));
    // 시간이 지날수록 선 얇아짐
    const outerW = 3.5 * (1 - t * 0.5);
    const innerW = 1.5 * (1 - t * 0.4);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    // 외부 글로우 (황금빛)
    ctx.shadowColor = '#ffe060';
    ctx.shadowBlur = 14 + flicker * 10;
    ctx.strokeStyle = '#ffec80';
    ctx.lineWidth = outerW;
    ctx.beginPath();
    for (const s of bolt.segs) { ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); }
    ctx.stroke();

    // 내부 코어 (흰색)
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 5;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = innerW;
    ctx.beginPath();
    for (const s of bolt.segs) { ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); }
    ctx.stroke();

    ctx.restore();
  }
}

// ==== explosion (bomb) ====
function explodeBrick(brick) {
  const cx = brick.x + brick.w/2, cy = brick.y + brick.h/2;
  const radius = 45;

  // 화면 흔들림
  screenShake = 0.45;

  // 충격파 링 2겹
  shockwaves.push({ x:cx, y:cy, maxR:68, life:0.42, age:0 });
  shockwaves.push({ x:cx, y:cy, maxR:40, life:0.26, age:0 });

  // 플래시 2겹 (흰색 → 주황)
  particles.push({ x:cx, y:cy, vx:0, vy:0, life:0.18, age:0, size:32, color:'#ffffff', spin:0, gravity:0, type:'flash' });
  particles.push({ x:cx, y:cy, vx:0, vy:0, life:0.30, age:0, size:22, color:'#ffcc40', spin:0, gravity:0, type:'flash' });

  // 화염 파티클 (40개, 방사형)
  const fireColors = ['#fff8a0','#ffcc40','#ff8820','#ff5010','#cc2800'];
  for (let i=0;i<40;i++) {
    const a = (i/40)*Math.PI*2 + (Math.random()-0.5)*0.25;
    const s = 2.5 + Math.random()*5.5;
    particles.push({
      x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s - 0.8,
      life:0.5+Math.random()*0.5, age:0,
      size:3+Math.random()*5, color:fireColors[Math.floor(Math.random()*fireColors.length)],
      spin:(Math.random()-0.5)*8, gravity:0.10, type:'sparkle'
    });
  }

  // 파편 (어두운 rect 조각들)
  for (let i=0;i<14;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 3.5 + Math.random()*4.5;
    particles.push({
      x:cx+(Math.random()-0.5)*brick.w*0.5, y:cy+(Math.random()-0.5)*brick.h*0.5,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1.2,
      life:0.45+Math.random()*0.4, age:0,
      size:2, w:4+Math.random()*5, h:2+Math.random()*2,
      color:'#5a4050', spin:(Math.random()-0.5)*18, gravity:0.22, type:'rect'
    });
  }

  // 연기 (10개, 천천히 위로)
  for (let i=0;i<10;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 0.6 + Math.random()*1.8;
    particles.push({
      x:cx+(Math.random()-0.5)*12, y:cy+(Math.random()-0.5)*8,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1.4,
      life:1.0+Math.random()*0.7, age:0,
      size:6+Math.random()*6, color:'#5a5060',
      spin:(Math.random()-0.5)*2, gravity:-0.02, type:'bubble'
    });
  }

  // 연쇄 폭발
  for (const other of bricks) {
    if (!other.alive || other === brick) continue;
    if (other.type === 'gold') continue;
    const ox = other.x + other.w/2, oy = other.y + other.h/2;
    if (Math.hypot(ox - cx, oy - cy) < radius) {
      damageBrick(other, 99, true);
    }
  }
}

function damageBrick(brick, dmg, fromExplosion) {
  if (!brick.alive) return;
  if (brick.type === 'gold') { brick.flash = 1; return; }
  brick.hp -= dmg;
  if (brick.hp <= 0) {
    brick.alive = false;
    if (mpActive && mpRoomRef) mpRoomRef.child(`bricks/${brick.mpKey}`).remove();
    score += 10 * level;
    updateStats();
    spawnBrickBreak(brick.x + brick.w/2, brick.y + brick.h/2, brick.color, level);
    if (!fromExplosion) sfxPlay('brick');
    // drop powerup
    if (brick.powerUp && !fromExplosion) {
      const px = brick.x + brick.w/2;
      powerUps.push({ x: px, baseX: px, y: brick.y + brick.h/2, vy: 1.3, type: brick.powerUp, t: Math.random()*20 });
    }
    if (brick.type === 'bomb') { sfxPlay('bomb'); explodeBrick(brick); }
  } else {
    sfxPlay('brick_hard');
    brick.flash = 1;
  }
}

// ==== physics ====
function update(dt) {
  if (paused || gameOver) return;

  // level transition
  if (levelTransition) {
    levelTransition.t += dt;
    // spawn additional confetti during celebrate
    if (levelTransition.phase==='celebrate' && Math.random()<0.3) {
      const pastel = ['#f2b5d4','#f7e1a1','#a8d8cb','#a8c8e8','#c5a8e0','#ffe87a'];
      confetti.push({
        x: Math.random()*BOARD_W, y: -10,
        vx: (Math.random()-0.5)*3, vy: 1+Math.random()*2,
        life: 3, age:0, size:3+Math.random()*4,
        color: pastel[Math.floor(Math.random()*pastel.length)],
        spin:(Math.random()-0.5)*8,
        shape: Math.random()<0.5?'star':'rect'
      });
    }
    if (levelTransition.phase === 'celebrate' && levelTransition.t >= 1.8) {
      levelTransition.phase = 'transition';
      levelTransition.t = 0;
      // check if final level
      if (level >= 50) {
        if (mpActive) { setTimeout(mpEndGame, 800); levelTransition = null; return; }
        gameOver = true;
        showOverlay(`YOU WIN!\n<div class="sub">Score: ${score}</div>\n<button class="btn" id="restartBtn">PLAY AGAIN</button>`);
        levelTransition = null;
        return;
      }
      nextLevel();
    } else if (levelTransition.phase === 'transition' && levelTransition.t >= 1.0) {
      levelTransition = null;
    }
    updateParticles(dt);
    return;
  }

  // paddle movement
  if (paddle.moveLeft) paddle.x -= paddle.speed;
  if (paddle.moveRight) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(BOARD_W - paddle.w, paddle.x));

  // update moving bricks
  for (const brick of bricks) {
    if (!brick.alive || !brick.vx) continue;
    brick.x += brick.vx;
    if (brick.x < PAD) { brick.x = PAD; brick.vx = Math.abs(brick.vx); }
    if (brick.x + brick.w > BOARD_W - PAD) { brick.x = BOARD_W - PAD - brick.w; brick.vx = -Math.abs(brick.vx); }
  }

  // 슬로우 팩터: 번개/레이저변신 = 0.05x, 로봇모드 = 0.38x, 파이어볼 = 0.62x
  const _thunderSlow = thunderBolts.some(b => b.age >= 0 && b.age < b.life);
  const _tSlowFactor = _thunderSlow ? 0.05
    : paddleState.laserTransform > 0 ? 0.05
    : paddleState.laser > 0 ? 0.38
    : (paddleState.carrier > 0 && balls.some(b => b._carrierLanding)) ? 1.0
    : paddleState.fire > 0 ? 0.62
    : balls.some(b => b.ghost) ? 0.45
    : 1.0;

  // balls
  for (const ball of balls) {
    if (ball.stuck) {
      // respect stickOffset (set when caught) - clamped to paddle bounds
      const off = ball.stickOffset || 0;
      const maxOff = paddle.w/2 - ball.r - 1;
      const clamped = Math.max(-maxOff, Math.min(maxOff, off));
      ball.stickOffset = clamped;
      ball.x = paddle.x + paddle.w/2 + clamped;
      ball.y = paddle.y - ball.r - 2;
      continue;
    }
    // 착륙 중인 볼: 매 프레임 패들 중심으로 유도 + 거리 비례 감속
    if (ball._carrierLanding) {
      const tx = paddle.x + paddle.w / 2;
      const ty = paddle.y - ball.r - 1;
      const dx = tx - ball.x;
      const dy = ty - ball.y;
      const dist = Math.hypot(dx, dy) || 1;
      // 거리 멀수록 빠름, 가까울수록 느림 (최소 0.4, 최대 3.5)
      const spd = Math.max(0.4, Math.min(3.5, dist * 0.12));
      ball.vx = (dx / dist) * spd;
      ball.vy = (dy / dist) * spd;
      // ★ 실제 위치 이동 (없으면 공이 얼어붙음)
      ball.x += ball.vx;
      ball.y += ball.vy;
      // 바닥으로 빠져도 죽지 않음
      if (ball._dead) ball._dead = false;
      // 패들 근처 도달 시 착륙
      if (dist < 4) {
        ball.x = tx;
        ball.y = ty;
        ball.stuck = true;
        ball.launched = false;
        ball.stickOffset = 0;
        ball._carrierLanding = false;
      }
      continue; // 벽/패들 충돌 계산 건너뜀
    }

    ball.x += ball.vx * _tSlowFactor;
    ball.y += ball.vy * _tSlowFactor;

    // 🔥 파이어 트레일 파티클
    if (paddleState.fire > 0) {
      const fc = ['#fff8a0','#ffda00','#ff9020','#ff6020','#ff3010'];
      for (let i = 0; i < 3; i++) {
        particles.push({
          x: ball.x + (Math.random()-0.5)*ball.r*1.2,
          y: ball.y + (Math.random()-0.5)*ball.r*1.2,
          vx: -ball.vx*0.18 + (Math.random()-0.5)*1.8,
          vy: -ball.vy*0.18 + (Math.random()-0.5)*1.8,
          life: 0.10 + Math.random()*0.13,
          age: 0,
          size: ball.r*(0.28+Math.random()*0.38),
          color: fc[Math.floor(Math.random()*fc.length)],
          spin: 0, gravity: -0.06, type: 'sparkle'
        });
      }
    }

    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); sfxPlay('wall'); ball.bounceCount = (ball.bounceCount||0)+1; }
    if (ball.x + ball.r > BOARD_W) { ball.x = BOARD_W - ball.r; ball.vx = -Math.abs(ball.vx); sfxPlay('wall'); ball.bounceCount = (ball.bounceCount||0)+1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); sfxPlay('wall'); ball.bounceCount = (ball.bounceCount||0)+1; }

    // 50회 바운스 초과 → 고스트 모드
    if (!ball.ghost && (ball.bounceCount||0) > 50) {
      ball.ghost = true;
      ball.bounceCount = 0;
      spawnParticles(ball.x, ball.y, '#c0e0ff', 14);
      sfxPlay('powerup');
    }

    // paddle collision
    if (ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h &&
        ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w && ball.vy > 0) {
      sfxPlay('paddle');
      // 고스트 모드 해제
      ball.ghost = false;
      ball.bounceCount = 0;
      ball.y = paddle.y - ball.r;
      const hitPos = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      const speed = Math.hypot(ball.vx, ball.vy);
      const newAngle = -Math.PI/2 + hitPos * (Math.PI/3);
      ball.vx = Math.cos(newAngle) * speed;
      ball.vy = Math.sin(newAngle) * speed;
      // catch sticks ball and decrements counter
      if (paddleState.catch > 0 || ball._carrierLanding) {
        ball.stuck = true;
        ball.launched = false;
        ball.stickOffset = ball.x - (paddle.x + paddle.w/2);
        ball._carrierLanding = false;
        if (paddleState.catch > 0) {
          paddleState.catch--;
          updatePowerDisplay();
        }
      }
    }

    // fall off
    if (ball.y - ball.r > BOARD_H) ball._dead = true;

    // brick collisions
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w &&
          ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {

        if (ball.ghost) {
          // 고스트: 튕기지 않고 통과하며 파괴 (골드 제외)
          if (brick.type !== 'gold') damageBrick(brick, 99, false);
          // continue — 다음 벽돌도 체크 (break 안 함)
          continue;
        }

        // 일반 충돌 반응
        if (paddleState.fire <= 0 || brick.type === 'gold' || brick.type === 'hard') {
          const overlapLeft   = (ball.x + ball.r) - brick.x;
          const overlapRight  = (brick.x + brick.w) - (ball.x - ball.r);
          const overlapTop    = (ball.y + ball.r) - brick.y;
          const overlapBottom = (brick.y + brick.h) - (ball.y - ball.r);
          const minX = Math.min(overlapLeft, overlapRight);
          const minY = Math.min(overlapTop, overlapBottom);
          if (minX < minY) {
            ball.vx = -ball.vx;
            ball.x += overlapLeft < overlapRight ? -(overlapLeft + 0.5) : (overlapRight + 0.5);
          } else {
            ball.vy = -ball.vy;
            ball.y += overlapTop < overlapBottom ? -(overlapTop + 0.5) : (overlapBottom + 0.5);
          }
          const MIN_VY = 1.8;
          if (Math.abs(ball.vy) < MIN_VY) {
            ball.vy = ball.vy >= 0 ? MIN_VY : -MIN_VY;
          }
        }
        ball.bounceCount = (ball.bounceCount||0) + 1;
        damageBrick(brick, 1, false);
        break;
      }
    }

    // 끼임 안전망: 일정 프레임 동안 거의 안 움직이면 강제로 위쪽으로 탈출
    if (!ball.stuck) {
      ball._stuckCount = ball._stuckCount || 0;
      const movedX = Math.abs(ball.x - (ball._lastX || ball.x));
      const movedY = Math.abs(ball.y - (ball._lastY || ball.y));
      if (movedX + movedY < 0.3) {
        ball._stuckCount++;
        if (ball._stuckCount > 40) {
          ball.vy = -Math.abs(currentBallSpeed());
          ball.vx = (Math.random() - 0.5) * currentBallSpeed();
          ball._stuckCount = 0;
        }
      } else {
        ball._stuckCount = 0;
      }
      ball._lastX = ball.x;
      ball._lastY = ball.y;
    }
  }
  balls = balls.filter(b => !b._dead);
  if (balls.length === 0) {
    loseLife();
    return;
  }

  // powerups falling
  powerUps = powerUps.filter(pu => {
    pu.y += pu.vy;
    pu.x = pu.baseX + Math.sin(pu.t * 0.08) * 6; // gentle wobble side to side
    if (pu.y > BOARD_H) return false;
    // caught by paddle?
    if (pu.y + 13 > paddle.y && pu.y - 13 < paddle.y + paddle.h &&
        pu.x > paddle.x - 13 && pu.x < paddle.x + paddle.w + 13) {
      // celebration particles on catch
      const def = POWERUPS[pu.type];
      spawnParticles(pu.x, pu.y, def.color, 14);
      applyPowerUp(pu.type);
      return false;
    }
    return true;
  });

  // lasers
  lasers = lasers.filter(l => {
    l.y += l.vy;
    if (l.y < 0) return false;
    // hit a brick?
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (l.x > brick.x && l.x < brick.x + brick.w &&
          l.y > brick.y && l.y < brick.y + brick.h) {
        damageBrick(brick, 1, false);
        return false;
      }
    }
    return true;
  });

  // decay power states
  if (paddleState.laser > 0) {
    paddleState.laser -= 1;
    // auto-fire: 볼이 움직이는 중 & 변신 완료 후에만 발사
    const ballInPlay = balls.some(b => !b.stuck);
    if (ballInPlay && paddleState.laserTransform <= 0) {
      laserFireTimer++;
      if (laserFireTimer >= 22) {
        laserFireTimer = 0;
        lasers.push({ x: paddle.x + 6,           y: paddle.y, vy: -10 });
        lasers.push({ x: paddle.x + paddle.w - 6, y: paddle.y, vy: -10 });
      }
    } else {
      laserFireTimer = 0;
    }
    if (paddleState.laser <= 0) {
      updatePowerDisplay();
      // 로봇 모드 종료 → 공 속도 정상으로 복원
      for (const b of balls) if (!b.stuck) applyBallSpeed(b);
    }
  } else {
    laserFireTimer = 0;
  }
  if (paddleState.fire > 0) { paddleState.fire -= 1; if(paddleState.fire<=0) updatePowerDisplay(); }
  if (paddleState.laserTransform > 0) paddleState.laserTransform = Math.max(0, paddleState.laserTransform - dt);

  // 캐리어 변신 타이머 감소
  if (paddleState.carrierTransform > 0) {
    paddleState.carrierTransform = Math.max(0, paddleState.carrierTransform - dt);
  }

  // 변신 완료 + 볼 착륙 완료 → 인터셉터 발진 (매 프레임 체크)
  if (paddleState.carrier > 0 && paddleState.carrierTransform <= 0 && interceptors.length === 0) {
    const allLanded = balls.every(b => b.stuck && !b._carrierLanding);
    if (allLanded) {
      for (let i = 0; i < 8; i++) {
        interceptors.push({
          x: paddle.x + paddle.w * 0.2 + (paddle.w * 0.6) * (i / 7),
          y: paddle.y,
          vx: 0, vy: 0,
          state: 'bay',
          target: null,
          launchDelay: i * 0.18,
          age: 0
        });
      }
    }
  }

  // 인터셉터 업데이트
  if (interceptors.length > 0) {
    const aliveTargetable = bricks.filter(b => b.alive && b.type !== 'gold' && !b._interceptorTarget);
    const anyBricksLeft = bricks.some(b => b.alive && b.type !== 'gold');

    // 벽돌 다 사라지면 bay/flying 인터셉터 즉시 귀환
    if (!anyBricksLeft) {
      for (const ic of interceptors) {
        if (ic.state === 'flying' || ic.state === 'bay') {
          if (ic.target) { ic.target._interceptorTarget = false; ic.target = null; }
          ic.state = 'returning';
        }
      }
    }

    let allDone = true;

    for (const ic of interceptors) {
      ic.age += dt;

      if (ic.state === 'bay') {
        // 패들 위에 대기
        ic.x = paddle.x + paddle.w * (interceptors.indexOf(ic) / 7) * 0.9 + paddle.w * 0.05;
        ic.y = paddle.y - 4;
        if (ic.age >= ic.launchDelay && aliveTargetable.length > 0) {
          const t = aliveTargetable.reduce((closest, b) => {
            const dx = (b.x + b.w/2) - ic.x, dy = (b.y + b.h/2) - ic.y;
            const dc = (closest.x + closest.w/2) - ic.x, dy2 = (closest.y + closest.h/2) - ic.y;
            return Math.hypot(dx,dy) < Math.hypot(dc,dy2) ? b : closest;
          });
          ic.target = t;
          t._interceptorTarget = true;
          ic.state = 'flying';
          sfxPlay('interceptor_launch');
        } else if (ic.age >= ic.launchDelay && aliveTargetable.length === 0) {
          // 타겟 없으면 출격 없이 바로 done
          ic.state = 'done';
        }
        allDone = false;

      } else if (ic.state === 'flying') {
        if (!ic.target || !ic.target.alive) {
          ic.state = 'returning';
        } else {
          const tx = ic.target.x + ic.target.w/2, ty = ic.target.y + ic.target.h/2;
          const dx = tx - ic.x, dy = ty - ic.y;
          const dist = Math.hypot(dx, dy);
          const spd = 4.5;
          if (dist < 6) {
            // 명중!
            ic.target._interceptorTarget = false;
            damageBrick(ic.target, 99, false);
            sfxPlay('interceptor_hit');
            spawnParticles(tx, ty, '#a0d4ff', 8);
            ic.target = null;
            ic.state = 'returning';
          } else {
            ic.x += (dx/dist) * spd;
            ic.y += (dy/dist) * spd;
          }
        }
        allDone = false;

      } else if (ic.state === 'returning') {
        const tx = paddle.x + paddle.w * 0.5, ty = paddle.y;
        const dx = tx - ic.x, dy = ty - ic.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 5) {
          ic.state = 'done';
        } else {
          ic.x += (dx/dist) * 5;
          ic.y += (dy/dist) * 5;
        }
        allDone = false;

      } else if (ic.state === 'done') {
        // 이 녀석은 완료
      } else {
        allDone = false;
      }
    }

    // 모든 인터셉터가 전원 귀환 완료(done)일 때만 캐리어 모드 해제
    const allReturned = interceptors.length > 0 &&
      interceptors.every(ic => ic.state === 'done');
    if (allReturned) {
      interceptors = [];
      paddleState.carrier = 0;
      paddleState.carrierTransform = 0;
      // 공 재발사
      for (const b of balls) {
        if (b.stuck) {
          const spd = currentBallSpeed();
          const ang = -Math.PI / 2 + (Math.random() - 0.5) * 0.4;
          b.vx = Math.cos(ang) * spd;
          b.vy = Math.sin(ang) * spd;
          b.stuck = false; b.launched = true;
        }
      }
    }
  }

  updateParticles(dt);

  // thunder bolt 애니메이션 업데이트
  thunderBolts = thunderBolts.filter(b => { b.age += dt; return b.age < b.life; });

  // shockwave 업데이트
  shockwaves = shockwaves.filter(s => { s.age += dt; return s.age < s.life; });

  // screenShake 감소
  if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2.5);

  // win check — 번개 이펙트 + 인터셉터 전원 귀환 후에 레벨 전환
  const _thunderAnimActive = thunderBolts.some(b => b.age >= 0 && b.age < b.life);
  const _interceptorsActive = interceptors.length > 0 &&
    interceptors.some(ic => ic.state !== 'done');
  const destructibleLeft = bricks.length > 0 && bricks.some(b => b.alive && b.type !== 'gold');
  if (!destructibleLeft && bricks.length > 0 && !levelTransition && !_thunderAnimActive && !_interceptorsActive) {
    sfxPlay('level_up');
    levelTransition = { phase: 'celebrate', t: 0, level: level };
    spawnConfetti();
  }
}

// ==== drawing ====
function drawBackground() {
  const theme = currentTheme();
  // base fill
  ctx.fillStyle = theme.boardBg;
  ctx.fillRect(0, 0, BOARD_W, BOARD_H);

  // pattern overlays
  switch (theme.gridBg) {
    case 'softgrid': {
      // very subtle dot grid
      ctx.fillStyle = 'rgba(255,255,255,0.035)';
      for (let y = 20; y < BOARD_H; y += 28) {
        for (let x = 20; x < BOARD_W; x += 28) {
          ctx.beginPath(); ctx.arc(x, y, 0.8, 0, Math.PI*2); ctx.fill();
        }
      }
      // center vignette
      const vg = ctx.createRadialGradient(BOARD_W/2, BOARD_H/2, BOARD_H*0.3, BOARD_W/2, BOARD_H/2, BOARD_H*0.8);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, BOARD_W, BOARD_H);
      break;
    }
    case 'mortar': {
      // horizontal dark lines (mortar band)
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      for (let y = 0; y < BOARD_H; y += 24) ctx.fillRect(0, y, BOARD_W, 1);
      break;
    }
    case 'dots': {
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      for (let y = 16; y < BOARD_H; y += 24) {
        for (let x = 16; x < BOARD_W; x += 24) {
          ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
        }
      }
      break;
    }
    case 'grid': {
      ctx.strokeStyle = 'rgba(0,255,204,0.08)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x < BOARD_W; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, BOARD_H); ctx.stroke(); }
      for (let y = 0; y < BOARD_H; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(BOARD_W, y); ctx.stroke(); }
      break;
    }
    case 'frost': {
      // random frost spots
      ctx.fillStyle = 'rgba(200,240,255,0.07)';
      const rng = 12345;
      for (let i = 0; i < 40; i++) {
        const x = ((i*73 + rng) % 997) / 997 * BOARD_W;
        const y = ((i*41 + rng) % 991) / 991 * BOARD_H;
        ctx.beginPath(); ctx.arc(x, y, 6+((i*31)%5), 0, Math.PI*2); ctx.fill();
      }
      break;
    }
    case 'leaves': {
      // subtle leaf shapes scattered
      ctx.fillStyle = 'rgba(120,160,90,0.08)';
      for (let i = 0; i < 20; i++) {
        const x = ((i*79) % 100) / 100 * BOARD_W;
        const y = ((i*43) % 100) / 100 * BOARD_H;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(i);
        ctx.beginPath();
        ctx.ellipse(0, 0, 5, 2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      break;
    }
    case 'stars': {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (let i = 0; i < 80; i++) {
        const x = ((i*137) % 1000) / 1000 * BOARD_W;
        const y = ((i*199) % 1000) / 1000 * BOARD_H;
        const s = ((i*7)%3) * 0.3 + 0.4;
        ctx.globalAlpha = 0.2 + ((i*11)%5)*0.15;
        ctx.fillRect(x, y, s, s);
      }
      ctx.globalAlpha = 1;
      // a few larger stars
      for (let i = 0; i < 15; i++) {
        const x = ((i*211) % 1000) / 1000 * BOARD_W;
        const y = ((i*173) % 1000) / 1000 * BOARD_H;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();ctx.arc(x, y, 0.8, 0, Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'paper': {
      // paper texture: subtle noise
      ctx.fillStyle = 'rgba(180,160,120,0.04)';
      for (let i = 0; i < 200; i++) {
        const x = ((i*97) % 1000) / 1000 * BOARD_W;
        const y = ((i*151) % 1000) / 1000 * BOARD_H;
        ctx.fillRect(x, y, 1, 1);
      }
      // horizontal line
      ctx.strokeStyle = 'rgba(180,160,120,0.12)';
      ctx.lineWidth = 0.3;
      for (let y = 30; y < BOARD_H; y += 30) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(BOARD_W, y); ctx.stroke();
      }
      break;
    }
    case 'waves': {
      // wavy lines
      const t = performance.now() * 0.0005;
      ctx.strokeStyle = 'rgba(140,220,240,0.1)';
      ctx.lineWidth = 1;
      for (let y = 20; y < BOARD_H; y += 40) {
        ctx.beginPath();
        for (let x = 0; x <= BOARD_W; x += 5) {
          const wy = y + Math.sin((x * 0.05) + t + y*0.1) * 4;
          if (x===0) ctx.moveTo(x, wy); else ctx.lineTo(x, wy);
        }
        ctx.stroke();
      }
      break;
    }
    case 'lava': {
      // pulsing red glow spots
      const t = performance.now() * 0.001;
      for (let i = 0; i < 6; i++) {
        const x = ((i*173) % 1000) / 1000 * BOARD_W;
        const y = ((i*241) % 1000) / 1000 * BOARD_H;
        const pulse = 0.3 + Math.sin(t*2 + i)*0.2;
        const grad = ctx.createRadialGradient(x, y, 0, x, y, 60);
        grad.addColorStop(0, `rgba(255,80,20,${pulse})`);
        grad.addColorStop(1, 'rgba(255,80,20,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(x-60, y-60, 120, 120);
      }
      break;
    }
  }
}

function drawCarrierPaddle() {
  const px = paddle.x, py = paddle.y, pw = paddle.w, ph = paddle.h;
  const tNow = performance.now() * 0.001;
  const tp = paddleState.carrierTransform > 0 ? paddleState.carrierTransform / 2.0 : 0;
  const hum = 0.7 + 0.3 * Math.sin(tNow * 3.5); // 엔진 맥동

  // 엔진 글로우 (하단)
  const glow = ctx.createRadialGradient(px+pw/2, py+ph, 0, px+pw/2, py+ph, pw*0.8);
  glow.addColorStop(0, `rgba(80,160,255,${0.28*hum})`);
  glow.addColorStop(1, 'rgba(80,160,255,0)');
  ctx.save();
  ctx.fillStyle = glow;
  ctx.fillRect(px-pw*0.3, py, pw*1.6, ph*3);
  ctx.restore();

  // 선체 그림자
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundedPath(px-2, py+3, pw+4, ph, ph*0.35);
  ctx.fill();
  ctx.restore();

  // 선체 바디 — 프로토스 골드/블루 그라데이션
  ctx.save();
  roundedPath(px, py, pw, ph, ph*0.35);
  ctx.clip();
  const hull = ctx.createLinearGradient(px, py, px, py+ph);
  hull.addColorStop(0, '#6090c8');
  hull.addColorStop(0.4, '#4070a8');
  hull.addColorStop(1, '#203860');
  ctx.fillStyle = hull;
  ctx.fillRect(px, py, pw, ph);
  // 중앙 패널 구분
  ctx.fillStyle = 'rgba(160,220,255,0.12)';
  ctx.fillRect(px + pw*0.3, py, pw*0.4, ph);
  // 상단 하이라이트
  ctx.fillStyle = 'rgba(200,230,255,0.22)';
  ctx.fillRect(px+2, py+1, pw-4, 1.5);
  ctx.restore();

  // 격납고 슬롯 (6개 작은 홈)
  ctx.save();
  for (let i = 0; i < 6; i++) {
    const sx = px + pw*0.12 + i*(pw*0.76/5);
    ctx.fillStyle = `rgba(20,50,100,${0.55+0.2*Math.sin(tNow*4+i)})`;
    roundedPath(sx, py+ph*0.2, pw*0.08, ph*0.6, 1);
    ctx.fill();
    // 슬롯 내부 빛
    ctx.fillStyle = `rgba(100,180,255,${0.25*hum})`;
    roundedPath(sx+0.5, py+ph*0.25, pw*0.055, ph*0.5, 1);
    ctx.fill();
  }
  ctx.restore();

  // 날개 확장부
  ctx.save();
  ctx.fillStyle = '#304e78';
  // 왼쪽 날개
  ctx.beginPath();
  ctx.moveTo(px, py+ph*0.3);
  ctx.lineTo(px-8, py+ph*0.5);
  ctx.lineTo(px, py+ph*0.9);
  ctx.closePath(); ctx.fill();
  // 오른쪽 날개
  ctx.beginPath();
  ctx.moveTo(px+pw, py+ph*0.3);
  ctx.lineTo(px+pw+8, py+ph*0.5);
  ctx.lineTo(px+pw, py+ph*0.9);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // 변신 에너지 파동
  if (tp > 0) {
    const waveA = tp * Math.abs(Math.sin(tp * Math.PI * 7)) * 0.5;
    if (waveA > 0.01) {
      ctx.save();
      ctx.globalAlpha = waveA;
      ctx.shadowColor = '#60a0ff'; ctx.shadowBlur = 25;
      ctx.strokeStyle = 'rgba(120,180,255,0.7)';
      ctx.lineWidth = 1.5;
      roundedPath(px-10, py-8, pw+20, ph+12, 6);
      ctx.stroke();
      ctx.restore();
    }
    // 발진 준비 파티클
    if (Math.random() < tp * 0.6) {
      particles.push({
        x: px + Math.random()*pw, y: py + (Math.random()-0.5)*ph,
        vx: (Math.random()-0.5)*3, vy: -1-Math.random()*3,
        life: 0.15+Math.random()*0.2, age: 0,
        size: 1+Math.random()*2, color: '#80c0ff',
        spin: 0, gravity: 0.05, type: 'sparkle'
      });
    }
  }
}

function drawInterceptors() {
  for (const ic of interceptors) {
    if (ic.state === 'bay' || ic.state === 'done') continue;
    const tNow = performance.now() * 0.001;
    const pulse = 0.7 + 0.3 * Math.sin(tNow * 12 + interceptors.indexOf(ic));

    ctx.save();
    ctx.translate(ic.x, ic.y);

    // 비행 방향 계산
    let angle = -Math.PI / 2;
    if (ic.target) {
      angle = Math.atan2(ic.target.y + ic.target.h/2 - ic.y, ic.target.x + ic.target.w/2 - ic.x);
    } else if (ic.state === 'returning') {
      angle = Math.atan2(paddle.y - ic.y, paddle.x + paddle.w/2 - ic.x);
    }
    ctx.rotate(angle + Math.PI/2);

    // 엔진 글로우 후광
    const eg = ctx.createRadialGradient(0, 3, 0, 0, 3, 8);
    eg.addColorStop(0, `rgba(80,160,255,${0.5*pulse})`);
    eg.addColorStop(1, 'rgba(80,160,255,0)');
    ctx.fillStyle = eg;
    ctx.fillRect(-8, -2, 16, 14);

    // 인터셉터 본체 (다이아몬드 형태)
    ctx.shadowColor = '#60b0ff'; ctx.shadowBlur = 6 * pulse;
    ctx.fillStyle = '#a0d0ff';
    ctx.beginPath();
    ctx.moveTo(0, -7);   // 앞
    ctx.lineTo(4, 0);    // 오른쪽
    ctx.lineTo(2, 5);    // 뒤오른
    ctx.lineTo(0, 3);
    ctx.lineTo(-2, 5);   // 뒤왼
    ctx.lineTo(-4, 0);   // 왼쪽
    ctx.closePath(); ctx.fill();

    // 코어 (밝은 중심)
    ctx.fillStyle = `rgba(200,240,255,${0.8*pulse})`;
    ctx.beginPath(); ctx.arc(0, -1, 1.8, 0, Math.PI*2); ctx.fill();

    ctx.restore();

    // 엔진 꼬리 파티클
    if (Math.random() < 0.7) {
      particles.push({
        x: ic.x + (Math.random()-0.5)*3,
        y: ic.y + (Math.random()-0.5)*3,
        vx: (Math.random()-0.5)*0.8,
        vy: (Math.random()-0.5)*0.8,
        life: 0.08+Math.random()*0.1, age: 0,
        size: 0.8+Math.random()*1.5, color: '#4090e0',
        spin: 0, gravity: 0, type: 'sparkle'
      });
    }
  }
}

function drawSpaceshipPaddle() {
  const px = paddle.x, py = paddle.y, pw = paddle.w, ph = paddle.h;
  const tNow = performance.now() * 0.001;
  const theme = currentTheme();
  const baseColor = paddleState.fire > 0 ? '#f4b580'
                  : paddleState.catch > 0 ? '#a8c8e8'
                  : theme.paddle;
  const {r, g, b} = hexToRgb(baseColor);
  const ep = 0.55 + 0.45 * Math.sin(tNow * 4.2);
  const rad = ph * 0.5;

  const glowPoints = [
    [px + pw*0.18, py + ph],
    [px + pw*0.5,  py + ph],
    [px + pw*0.82, py + ph],
  ];

  // ── 엔진 글로우 ──
  ctx.save();
  glowPoints.forEach(([gx, gy]) => {
    const g2 = ctx.createRadialGradient(gx, gy, 0, gx, gy + 5, pw*0.22);
    g2.addColorStop(0, `rgba(${Math.min(255,r+60)},${Math.min(255,g+80)},255,${0.45*ep})`);
    g2.addColorStop(1, 'rgba(80,140,255,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(gx - pw*0.22, gy - 2, pw*0.44, pw*0.3);
  });
  ctx.restore();

  // ── 사이드 핀 제거 ──

  // ── 메인 바디 (클립 전용 save/restore) ──
  ctx.save();
  roundedPath(px, py, pw, ph, rad);
  ctx.clip();
  const hull = ctx.createLinearGradient(px, py, px, py + ph);
  hull.addColorStop(0,   `rgba(${Math.min(255,r+38)},${Math.min(255,g+38)},${Math.min(255,b+38)},1)`);
  hull.addColorStop(0.5, baseColor);
  hull.addColorStop(1,   `rgba(${Math.max(0,r-28)},${Math.max(0,g-28)},${Math.max(0,b-28)},1)`);
  ctx.fillStyle = hull;
  ctx.fillRect(px, py, pw, ph);
  // 패널 라인
  ctx.strokeStyle = `rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},0.35)`;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(px + pw*0.5, py + 2); ctx.lineTo(px + pw*0.5, py + ph - 2);
  ctx.stroke();
  // 상단 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillRect(px + rad, py + 1, pw - rad*2, 1.8);
  ctx.restore(); // clip 해제

  // ── 크기 변화 표시 ──
  if (paddleState.shrink > 0 || paddleState.expand > 0) {
    ctx.save();
    ctx.font = `bold ${ph * 0.85}px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const label = paddleState.shrink > 0 ? '><' : '<>';
    ctx.fillText(label, px + pw / 2, py + ph / 2 + 0.5);
    ctx.restore();
  }

  // ── 엔진 노즐 점 ──
  ctx.save();
  glowPoints.forEach(([nx, ny]) => {
    ctx.fillStyle = `rgba(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)},1)`;
    ctx.beginPath(); ctx.arc(nx, ny, 2.2, 0, Math.PI*2); ctx.fill();
    const ng = ctx.createRadialGradient(nx, ny, 0, nx, ny, 4.5);
    ng.addColorStop(0, `rgba(180,230,255,${0.9*ep})`);
    ng.addColorStop(1, 'rgba(80,160,255,0)');
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.arc(nx, ny, 4.5, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawLaserPaddle() {
  const px = paddle.x, py = paddle.y, pw = paddle.w, ph = paddle.h;
  const tNow = performance.now() * 0.001;
  const tp = paddleState.laserTransform > 0 ? paddleState.laserTransform / 0.8 : 0;
  const towerW = 9, towerH = 15;
  const towerXL = px + 4;
  const towerXR = px + pw - 4 - towerW;
  const towerY  = py - towerH + 4;

  // 그림자
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  roundedPath(px-4, py+2, pw+8, ph, ph*0.4);
  ctx.fill();
  ctx.restore();

  // 포신 타워 바디
  ctx.save();
  [[towerXL, towerY], [towerXR, towerY]].forEach(([tx, ty]) => {
    roundedPath(tx, ty, towerW, towerH, 2);
    const tg = ctx.createLinearGradient(tx, ty, tx+towerW, ty);
    tg.addColorStop(0, '#4a5868'); tg.addColorStop(0.4, '#6a7888'); tg.addColorStop(1, '#3a4858');
    ctx.fillStyle = tg; ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.fillRect(tx+1, ty+2, 2, towerH-5);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 0.6;
    roundedPath(tx+0.5, ty+0.5, towerW-1, towerH-1, 1.5); ctx.stroke();
  });
  ctx.restore();

  // 포신 발광 팁
  const pulse = 0.65 + 0.35 * Math.sin(tNow * 9);
  ctx.save();
  [[towerXL + towerW/2, towerY+2], [towerXR + towerW/2, towerY+2]].forEach(([tx, ty]) => {
    ctx.shadowColor = '#ff5040'; ctx.shadowBlur = 10 * pulse;
    ctx.fillStyle = `rgba(255,${(70+40*pulse)|0},50,${0.85+0.15*pulse})`;
    ctx.beginPath(); ctx.arc(tx, ty, 3.2, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // 패들 바디 (기계적 그라데이션)
  ctx.save();
  roundedPath(px, py, pw, ph, ph*0.4);
  ctx.clip();
  const bg = ctx.createLinearGradient(px, py, px, py+ph);
  bg.addColorStop(0, '#8090a0'); bg.addColorStop(0.45, '#5a6878'); bg.addColorStop(1, '#38485a');
  ctx.fillStyle = bg; ctx.fillRect(px, py, pw, ph);
  // 패널 구분선
  ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(px+pw*0.28, py+1); ctx.lineTo(px+pw*0.28, py+ph-1);
  ctx.moveTo(px+pw*0.72, py+1); ctx.lineTo(px+pw*0.72, py+ph-1);
  ctx.stroke();
  // 상단 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.20)';
  ctx.fillRect(px+2, py+1, pw-4, 1.5);
  ctx.restore();

  // 변신 글로우 + 스파크 (투명 흰색 글로우)
  if (tp > 0) {
    const flickerA = tp * Math.abs(Math.sin(tp * Math.PI * 9)) * 0.45;
    if (flickerA > 0.01) {
      ctx.save();
      ctx.globalAlpha = flickerA;
      ctx.shadowColor = '#a0c8ff'; ctx.shadowBlur = 40;
      ctx.strokeStyle = 'rgba(160,200,255,0.6)';
      ctx.lineWidth = 2;
      roundedPath(px-8, py-towerH-2, pw+16, ph+towerH+4, 6);
      ctx.stroke();
      ctx.restore();
    }
    if (Math.random() < tp * 0.55) {
      particles.push({
        x: px + Math.random()*pw, y: py + (Math.random()-0.5)*ph*1.2,
        vx: (Math.random()-0.5)*5, vy: -1.5-Math.random()*4,
        life: 0.12+Math.random()*0.14, age: 0,
        size: 1.5+Math.random()*2.5, color: '#a0c8ff',
        spin: 0, gravity: 0.08, type: 'sparkle'
      });
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(SCALE, SCALE);

  // 화면 흔들림 (폭탄 폭발 시)
  if (screenShake > 0) {
    const mag = screenShake * 2.5;
    ctx.translate((Math.random()-0.5)*mag, (Math.random()-0.5)*mag);
  }

  // themed background
  drawBackground();

  const theme = currentTheme();

  // 충격파 링 (벽돌 위, 파티클 아래에 그림)
  for (const sw of shockwaves) {
    const t = sw.age / sw.life;
    const r = sw.maxR * t;
    const alpha = (1 - t) * 0.65;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#ff6020';
    ctx.lineWidth = 3 * (1 - t * 0.7);
    ctx.shadowColor = '#ff4000';
    ctx.shadowBlur = 12 * (1 - t);
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, Math.max(0, r), 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // bricks
  for (const brick of bricks) {
    if (!brick.alive) continue;
    let color = brick.color;
    if (brick.type === 'hard' && brick.hp < brick.maxHp) {
      // darker tint for damaged hard bricks (keep as hex)
      color = darkenHex(color, 35);
    }
    drawBrick(brick.x, brick.y, brick.w, brick.h, color, 1, brick.type==='gold'?'':'');
    // hp indicator for hard bricks
    if (brick.type === 'hard' && brick.maxHp > 1) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      const fontSize = Math.floor(brick.h * 0.6);
      ctx.font = `bold ${fontSize}px 'Segoe UI'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.strokeText(brick.hp, brick.x + brick.w/2, brick.y + brick.h/2);
      ctx.fillStyle = '#fff';
      ctx.fillText(brick.hp, brick.x + brick.w/2, brick.y + brick.h/2);
      ctx.restore();
    }
    // bomb icon (cartoon bomb: black sphere + fuse + spark)
    if (brick.type === 'bomb') {
      ctx.save();
      const cx = brick.x + brick.w/2;
      const cy = brick.y + brick.h/2 + 1;
      const br = brick.h * 0.38;

      // bomb body with gradient
      const bodyGrad = ctx.createRadialGradient(cx - br*0.3, cy - br*0.3, 0, cx, cy, br);
      bodyGrad.addColorStop(0, '#6a5a75');
      bodyGrad.addColorStop(0.5, '#2a2030');
      bodyGrad.addColorStop(1, '#15101a');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, br, 0, Math.PI*2);
      ctx.fill();

      // white specular highlight (cartoon shine)
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(cx - br*0.35, cy - br*0.4, br*0.22, br*0.14, -0.5, 0, Math.PI*2);
      ctx.fill();

      // fuse stem (short curved line from top)
      ctx.strokeStyle = '#8a6a40';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + br*0.1, cy - br*0.95);
      ctx.quadraticCurveTo(cx + br*0.6, cy - br*1.3, cx + br*0.8, cy - br*1.1);
      ctx.stroke();

      // spark at fuse tip
      const sparkX = cx + br*0.8;
      const sparkY = cy - br*1.1;
      // outer glow
      const sparkGrad = ctx.createRadialGradient(sparkX, sparkY, 0, sparkX, sparkY, br*0.6);
      sparkGrad.addColorStop(0, 'rgba(255,240,120,1)');
      sparkGrad.addColorStop(0.4, 'rgba(255,160,40,0.7)');
      sparkGrad.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = sparkGrad;
      ctx.fillRect(sparkX - br*0.6, sparkY - br*0.6, br*1.2, br*1.2);
      // small bright star
      ctx.fillStyle = '#fff8a0';
      drawStar(sparkX, sparkY, br*0.28);

      ctx.restore();
    }
  }

  // paddle — carrier > laser > normal 우선순위
  if (paddleState.carrier > 0) {
    drawCarrierPaddle();
  } else if (paddleState.laser > 0) {
    drawLaserPaddle();
  } else {
    drawSpaceshipPaddle();
  }

  // 캐치 남은 횟수 — 패들 위에 작게
  if (paddleState.catch > 0) {
    ctx.save();
    ctx.font = 'bold 8px Inter, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(168,200,232,0.92)';
    ctx.fillText(`×${paddleState.catch}`, paddle.x + paddle.w/2, paddle.y - 3);
    ctx.restore();
  }

  // balls
  for (const ball of balls) {
    drawBall(ball.x, ball.y, ball.r, paddleState.fire > 0, ball.ghost);
  }

  // 인터셉터
  drawInterceptors();

  // powerups
  for (const pu of powerUps) drawPowerUp(pu);

  // lasers
  for (const l of lasers) {
    ctx.save();
    ctx.strokeStyle = '#ffe0e0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y + 10);
    ctx.stroke();
    ctx.shadowColor = '#ff8080'; ctx.shadowBlur = 6;
    ctx.strokeStyle = '#ffb0b0';
    ctx.stroke();
    ctx.restore();
  }

  drawParticles();
  drawConfetti();

  // thunder bolts (파티클 위에 그려서 번쩍임 강조)
  drawThunderBolts();

  // level transition banner
  if (levelTransition) {
    drawLevelBanner();
  }

  ctx.restore();
}

function drawLevelBanner() {
  const lt = levelTransition;
  const theme = currentTheme();
  let text1, text2, bannerY, alpha, scale;

  // easing
  const ease = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

  if (lt.phase === 'celebrate') {
    text1 = `STAGE ${String(lt.level).padStart(2,'0')}`;
    text2 = 'COMPLETE';
    const t = lt.t;
    if (t < 0.35) {
      const p = ease(t / 0.35);
      bannerY = -120 + p * (BOARD_H/2 - 60 + 120);
      alpha = p;
      scale = 0.92 + p*0.08;
    } else if (t < 1.5) {
      bannerY = BOARD_H/2 - 60;
      alpha = 1;
      scale = 1;
    } else {
      const p = ease((t - 1.5) / 0.3);
      bannerY = BOARD_H/2 - 60;
      alpha = 1 - p;
      scale = 1 + p*0.05;
    }
  } else if (lt.phase === 'transition') {
    text1 = `STAGE ${String(level).padStart(2,'0')}`;
    text2 = theme.name;
    const t = lt.t;
    if (t < 0.35) {
      const p = ease(t / 0.35);
      bannerY = BOARD_H/2 - 60;
      alpha = p;
      scale = 1.08 - p*0.08;
    } else if (t < 0.7) {
      bannerY = BOARD_H/2 - 60;
      alpha = 1;
      scale = 1;
    } else {
      const p = ease((t - 0.7) / 0.3);
      bannerY = BOARD_H/2 - 60;
      alpha = 1 - p;
      scale = 1 - p*0.05;
    }
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  const cx = BOARD_W/2;
  const bw = 260, bh = 130;
  ctx.translate(cx, bannerY + bh/2);
  ctx.scale(scale, scale);
  ctx.translate(-cx, -bannerY - bh/2);

  const bx = cx - bw/2;

  // soft drop shadow (multiple layers)
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundedPath(bx+3, bannerY+8, bw, bh, 20);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  roundedPath(bx+1, bannerY+2, bw, bh, 20);
  ctx.fill();

  // card background (deep glass)
  const cardGrad = ctx.createLinearGradient(bx, bannerY, bx, bannerY + bh);
  cardGrad.addColorStop(0, 'rgba(20,18,28,0.92)');
  cardGrad.addColorStop(1, 'rgba(10,8,16,0.92)');
  ctx.fillStyle = cardGrad;
  roundedPath(bx, bannerY, bw, bh, 20);
  ctx.fill();

  // top border line (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  roundedPath(bx+0.5, bannerY+0.5, bw-1, bh-1, 19.5);
  ctx.stroke();

  // accent color glow dot in center behind text
  const accentGrad = ctx.createRadialGradient(cx, bannerY + bh*0.65, 0, cx, bannerY + bh*0.65, bw*0.5);
  accentGrad.addColorStop(0, theme.accent + '30');
  accentGrad.addColorStop(1, theme.accent + '00');
  ctx.fillStyle = accentGrad;
  ctx.fillRect(bx, bannerY, bw, bh);

  // thin accent line at top
  ctx.fillStyle = theme.accent;
  ctx.globalAlpha = alpha * 0.8;
  ctx.fillRect(bx + bw*0.35, bannerY + 28, bw*0.3, 1.5);
  ctx.globalAlpha = alpha;

  // label (small uppercase)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = '600 10px Inter, -apple-system, sans-serif';
  ctx.letterSpacing = '2px';
  // manual letter spacing since canvas doesn't support letter-spacing directly
  drawSpacedText(text1, cx, bannerY + 22, 2);

  // big title
  ctx.fillStyle = '#fff';
  ctx.font = '700 30px Inter, -apple-system, sans-serif';
  drawSpacedText(text2, cx, bannerY + 70, 1.5);

  // bottom progress bar (30 levels)
  const barY = bannerY + bh - 18;
  const barW = 180;
  const barX = cx - barW/2;
  const progressLevel = lt.phase === 'transition' ? level : lt.level;
  // background track
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundedPath(barX, barY, barW, 3, 1.5);
  ctx.fill();
  // filled portion
  const fillW = (progressLevel / 50) * barW;
  ctx.fillStyle = theme.accent;
  roundedPath(barX, barY, fillW, 3, 1.5);
  ctx.fill();
  // small text below: x / 30
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '600 9px Inter, sans-serif';
  ctx.fillText(`${progressLevel} / 50`, cx, barY + 12);

  ctx.restore();
}

// Helper: draw text with manual letter-spacing
function drawSpacedText(text, cx, y, spacing) {
  const chars = text.split('');
  const widths = chars.map(c => ctx.measureText(c).width);
  const totalW = widths.reduce((a,b)=>a+b,0) + spacing*(chars.length-1);
  let curX = cx - totalW/2;
  for (let i=0;i<chars.length;i++) {
    ctx.fillText(chars[i], curX + widths[i]/2, y);
    curX += widths[i] + spacing;
  }
}

let lastTime = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  update(dt);
  draw();
  if (mpActive && mpRoomRef) {
    mpSyncT = (mpSyncT||0) + dt;
    if (mpSyncT > 0.1) { mpSyncT = 0; mpRoomRef.child(`players/${mpMyPid}/paddleX`).set(Math.round(paddle.x)); }
  }
}

function pressLeft(v) { paddle.moveLeft = v; }
function pressRight(v) { paddle.moveRight = v; }

document.addEventListener('keydown', e => {
  // input/textarea에 포커스 중이면 게임 키 핸들러 무시
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'r' || e.key === 'R') { if (!mpActive) reset(); return; }
  if (gameOver) return;
  if (e.key === 'ArrowLeft') pressLeft(true);
  if (e.key === 'ArrowRight') pressRight(true);
  if (e.key === ' ' || e.key === 'ArrowUp') launchBall();
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (paused) { overlay.innerHTML = 'PAUSED'; overlay.style.display='block'; }
    else overlay.style.display = 'none';
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') pressLeft(false);
  if (e.key === 'ArrowRight') pressRight(false);
});

// ---- Touch: drag anywhere on screen to move paddle ----
let _touchActive = false;

document.addEventListener('touchstart', e => {
  _touchActive = true;
  // 공 발사는 캔버스 터치일 때만 (드래그 시작마다 레이저 남발 방지)
  if (e.target === canvas && paddleState.carrier <= 0 && balls.some(b => b.stuck)) launchBall();
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!_touchActive) return;
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  // Map finger X relative to canvas left edge → board X
  const relX = touch.clientX - rect.left;
  const boardX = relX / SCALE;
  paddle.x = Math.max(0, Math.min(BOARD_W - paddle.w, boardX - paddle.w / 2));
}, { passive: false });

document.addEventListener('touchend', () => { _touchActive = false; });
document.addEventListener('touchcancel', () => { _touchActive = false; });

// ---- Mouse (desktop) ----
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / SCALE;
  paddle.x = Math.max(0, Math.min(BOARD_W - paddle.w, mx - paddle.w / 2));
});
canvas.addEventListener('click', () => { if (paddleState.carrier <= 0 && balls.some(b => b.stuck)) launchBall(); });
