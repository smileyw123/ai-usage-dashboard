<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>벽돌깨기 멀티</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; overflow: hidden; touch-action: none; }
body {
  background: #0e0d14;
  display: flex; flex-direction: column; align-items: center;
  font-family: 'Inter', -apple-system, 'SF Pro Display', system-ui, sans-serif;
  color: #ededf0;
  font-feature-settings: "ss01", "cv11";
  transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── top HUD ── */
.top-hud {
  flex-shrink: 0;
  width: auto;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  align-items: center;
  padding: 10px 14px 6px;
  position: relative;
}
.hud-side {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
}
.hud-side:last-child {
  align-items: center;
}
.hud-label {
  font-size: 8px;
  color: rgba(255,255,255,0.35);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 2px;
  text-align: center;
}
.hud-value {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1;
  text-align: center;
}
.hud-best {
  color: #ffd700;
  text-shadow: 0 0 8px rgba(255,215,0,0.5);
}

/* ── power toast ── */
.power-toast {
  position: fixed;
  top: 72px;
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  opacity: 0;
  padding: 7px 18px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 200;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.power-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── main game area ── */
.main-area {
  flex: 1; display: flex; width: 100%; min-height: 0;
  justify-content: center; align-items: stretch;
}
.game-area {
  flex: 1; display: flex;
  justify-content: center; align-items: center;
  min-height: 0; position: relative; padding: 4px 8px 8px;
}
#board {
  display: block;
  border-radius: 12px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 0 0 1px rgba(255,255,255,0.04),
    0 20px 50px -20px rgba(0,0,0,0.6),
    0 10px 30px -15px rgba(0,0,0,0.5);
  transition: box-shadow 0.8s ease;
}

.overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #fff;
  display: none;
  white-space: pre-line; text-align: center; z-index: 10;
  padding: 28px 40px;
  background: rgba(12, 12, 18, 0.82);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
}
.overlay .btn {
  display: inline-block; margin-top: 20px; padding: 13px 36px;
  background: #fff; color: #0e0d14;
  border: none; border-radius: 999px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), box-shadow 0.2s;
  box-shadow: 0 6px 20px -6px rgba(255,255,255,0.3);
}
.overlay .btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 30px -8px rgba(255,255,255,0.4);
}
.overlay .btn.btn-sub {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7);
  box-shadow: none;
  margin-top: 10px;
  display: block;
  width: 100%;
}
.overlay .btn.btn-sub:hover {
  background: rgba(255,255,255,0.2);
  box-shadow: none;
}
.overlay .sub {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 8px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ══ MULTIPLAYER LOBBY ══ */
#mpLobby,#mpWait,#mpResult{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1000;
}
#mpLobby{
  background:linear-gradient(145deg,#f8f0fa 0%,#eef4fb 40%,#f0faf5 100%);
}
#mpWait,#mpResult{
  background:linear-gradient(145deg,#f8f0fa 0%,#eef4fb 40%,#f0faf5 100%);
}
#mpLobby.mp-hidden,#mpWait.mp-hidden,#mpResult.mp-hidden{display:none!important;}

/* lobby card */
.mp-card{
  background:rgba(255,255,255,0.72);
  border:1px solid rgba(200,190,220,0.35);
  border-radius:28px;padding:32px 26px;width:92%;max-width:340px;
  display:flex;flex-direction:column;gap:11px;
  box-shadow:0 8px 40px rgba(160,130,200,0.12), 0 2px 8px rgba(0,0,0,0.06);
  backdrop-filter:blur(24px);
}

/* logo */
.mp-logo{
  text-align:center;font-size:22px;font-weight:900;letter-spacing:-.5px;
  margin-bottom:4px;color:#2d2640;
}
.mp-logo em{color:rgba(120,100,160,0.45);font-style:normal;}
.mp-logo-sub{
  text-align:center;font-size:10px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:rgba(120,100,160,0.5);margin-top:-4px;margin-bottom:2px;
}

/* inputs */
.mp-inp{
  background:rgba(240,235,250,0.7);border:1.5px solid rgba(180,165,210,0.3);
  border-radius:14px;padding:13px 15px;color:#2d2640;
  font-size:15px;font-family:'Inter',sans-serif;outline:none;width:100%;
  transition:border-color .2s,background .2s;
}
.mp-inp::placeholder{color:rgba(120,100,160,0.38);}
.mp-inp:focus{border-color:rgba(160,130,210,0.6);background:rgba(248,244,255,0.9);}
.mp-inp-code{
  font-family:'JetBrains Mono',monospace;font-size:22px;
  letter-spacing:10px;text-align:center;text-transform:uppercase;
  color:#3d2f6a;
}

/* buttons */
.mp-btn{
  border:none;border-radius:999px;padding:13px;
  font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
}
.mp-btn-w{
  background:linear-gradient(135deg,#c5a8e0,#9db8e8);
  color:#fff;
  box-shadow:0 4px 16px rgba(160,130,210,0.3);
}
.mp-btn-w:active{transform:scale(0.97);}
.mp-btn-g{
  background:rgba(160,130,200,0.1);
  color:rgba(80,60,120,0.7);
  border:1.5px solid rgba(160,130,200,0.2);
}
.mp-btn-g:active{background:rgba(160,130,200,0.18);}

/* divider */
.mp-div{
  display:flex;align-items:center;gap:8px;
  color:rgba(120,100,160,0.38);font-size:10px;font-weight:700;letter-spacing:1.5px;
}
.mp-div::before,.mp-div::after{content:'';flex:1;height:1px;background:rgba(160,130,200,0.18);}

/* error */
.mp-err{font-size:11px;color:#d06070;text-align:center;min-height:14px;font-weight:600;}

/* wait room */
.mp-code-wrap{text-align:center;padding:10px 0 6px;}
.mp-code-lbl{font-size:9px;color:rgba(100,80,140,0.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.mp-code-val{
  font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;
  letter-spacing:10px;color:#3d2f6a;
}
.mp-plist{display:flex;flex-direction:column;gap:7px;min-height:50px;}
.mp-prow{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;background:rgba(200,185,230,0.12);border-radius:11px;
  font-size:13px;font-weight:600;color:#2d2640;
}
.mp-pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mp-badge{
  font-size:9px;padding:2px 7px;border-radius:999px;
  background:rgba(160,130,200,0.15);color:rgba(80,60,130,0.6);
  font-weight:700;margin-left:auto;
}
.mp-hint{font-size:11px;color:rgba(100,80,140,0.5);text-align:center;}
.mp-room-list{
  display:flex;flex-direction:column;gap:6px;
  height:148px;overflow-y:auto;scrollbar-width:none;
}
.mp-room-list::-webkit-scrollbar{display:none;}
.mp-room-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;background:rgba(200,185,230,0.1);
  border:1.5px solid transparent;border-radius:12px;
  cursor:pointer;transition:all .15s;
}
.mp-room-item:active{background:rgba(160,130,200,0.18);}
.mp-room-item.selected{
  background:rgba(160,130,200,0.18);
  border-color:rgba(160,130,200,0.5);
}
.mp-room-name{font-size:13px;font-weight:700;color:#2d2640;}
.mp-room-meta{font-size:10px;color:rgba(100,80,140,0.5);font-weight:600;}
.mp-room-empty{font-size:12px;color:rgba(100,80,140,0.35);text-align:center;padding:20px 0;}
.mp-ready-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-left:auto;transition:background .3s;}
.mp-btn:disabled,.mp-btn.disabled{opacity:0.35;pointer-events:none;}
.mp-url{
  font-size:9px;color:rgba(100,80,140,0.4);
  background:rgba(180,165,210,0.1);border-radius:8px;
  padding:7px 10px;text-align:center;word-break:break-all;line-height:1.5;
}

/* hud */
.mp-hud{
  flex-shrink:0;width:100%;display:none;align-items:stretch;
  background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);
  overflow-x:auto;scrollbar-width:none;
}
.mp-hud::-webkit-scrollbar{display:none;}
.mp-hp{flex:1;min-width:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 4px;border-right:1px solid rgba(255,255,255,0.05);}
.mp-hp:last-child{border-right:none;}
.mp-hp.me{background:rgba(255,255,255,0.04);}
.mp-hp.dead{opacity:.28;}
.mp-dot{width:6px;height:6px;border-radius:50%;margin-bottom:3px;}
.mp-nm{font-size:8px;color:rgba(255,255,255,0.3);margin-bottom:1px;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mp-sc{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;line-height:1;}
.mp-lv{font-size:8px;color:rgba(255,255,255,0.26);margin-top:2px;letter-spacing:1px;}

/* result */
.mp-rl{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.mp-rrow{display:flex;align-items:center;gap:10px;padding:10px 13px;background:rgba(200,185,230,0.12);border-radius:13px;}
.mp-rn{font-size:16px;font-weight:900;width:26px;text-align:center;}
.mp-rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mp-rname{flex:1;font-size:13px;font-weight:700;text-align:left;color:#2d2640;}
.mp-rsc{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:#3d2f6a;}

/* decorative blobs */
#mpLobby::before,#mpLobby::after,#mpWait::before,#mpResult::before{
  content:'';position:absolute;border-radius:50%;pointer-events:none;
}
#mpLobby::before{
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(200,175,240,0.28) 0%,transparent 70%);
  top:-60px;right:-60px;
}
#mpLobby::after{
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(160,210,200,0.2) 0%,transparent 70%);
  bottom:-40px;left:-40px;
}
#mpWait::before,#mpResult::before{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(200,175,240,0.2) 0%,transparent 70%);
  top:-80px;right:-80px;
}

</style>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>

<div id="mpLobby">
  <div class="mp-card">
    <!-- 같이하기 -->
    <div class="mp-div">같이하기</div>

    <!-- 닉네임 -->
    <div style="display:flex;flex-direction:column;gap:5px;">
      <label for="mpNameInp" style="font-size:9px;color:rgba(100,80,140,0.5);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding-left:4px;">닉네임</label>
      <div style="position:relative;">
        <input class="mp-inp" id="mpNameInp" placeholder="이름 입력" maxlength="8" autocomplete="off" style="padding-right:36px;">
        <span id="mpNameEditIcon" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:rgba(140,110,180,0.5);pointer-events:none;">✎</span>
      </div>
    </div>

    <!-- 탭 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;background:rgba(160,130,200,0.1);border-radius:12px;padding:3px;gap:3px;">
      <button id="mpTabCreate" onclick="mpSwitchTab('create')"
        style="border:none;border-radius:9px;padding:9px;font-size:12px;font-weight:800;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;background:linear-gradient(135deg,#c5a8e0,#9db8e8);color:#fff;box-shadow:0 2px 8px rgba(160,130,210,0.3);">
        방 만들기
      </button>
      <button id="mpTabJoin" onclick="mpSwitchTab('join')"
        style="border:none;border-radius:9px;padding:9px;font-size:12px;font-weight:800;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;background:transparent;color:rgba(100,80,140,0.55);">
        참여하기
      </button>
    </div>

    <!-- 탭 컨텐츠 -->
    <div id="mpTabContent">
      <!-- 방 만들기 패널 -->
      <div id="mpPanelCreate" style="display:flex;flex-direction:column;gap:10px;">
        <input class="mp-inp" id="mpTitleInp" placeholder="방 제목 입력" maxlength="12" autocomplete="off">
        <button class="mp-btn mp-btn-w" id="mpBtnCreate">방 만들기</button>
      </div>
      <!-- 참여하기 패널 -->
      <div id="mpPanelJoin" style="display:none;flex-direction:column;gap:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0 2px;">
          <span style="font-size:9px;color:rgba(100,80,140,0.45);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;">참여 가능한 방</span>
          <button onclick="mpLoadRoomList()" style="border:none;background:none;font-size:11px;color:rgba(120,90,160,0.6);font-weight:700;cursor:pointer;padding:2px 4px;">↻ 새로고침</button>
        </div>
        <div class="mp-room-list" id="mpRoomList"><div class="mp-room-empty">방 목록을 불러오는 중...</div></div>
        <button class="mp-btn mp-btn-w disabled" id="mpBtnJoin">입장하기</button>
      </div>
    </div>

    <div class="mp-err" id="mpErr"></div>

    <!-- 혼자하기 -->
    <div class="mp-div">혼자하기</div>
    <button class="mp-btn mp-btn-g" id="mpBtnSolo">1인 플레이</button>
  </div>
</div>
<div id="mpWait" class="mp-hidden">
  <div class="mp-card">
    <div class="mp-code-wrap">
      <div class="mp-code-lbl">방 제목</div>
      <div id="mpWaitCode" style="font-family:'Inter',sans-serif;font-size:22px;font-weight:900;letter-spacing:-0.5px;color:#3d2f6a;text-align:center;padding:4px 0;">----</div>
    </div>
    <div class="mp-plist" id="mpPList"></div>
    <div class="mp-hint" id="mpWaitHint">친구에게 코드를 알려주세요</div>
    <div class="mp-url" id="mpUrlBox"></div>
    <div style="display:flex;align-items:center;gap:10px;" id="mpStartRow">
      <button class="mp-btn mp-btn-w mp-hidden" id="mpBtnStart" style="flex:1;">게임 시작</button>
      <span id="mpReadyCount" class="mp-hidden" style="font-size:11px;font-weight:700;color:rgba(100,80,140,0.55);white-space:nowrap;"></span>
    </div>
    <button class="mp-btn mp-btn-g" id="mpBtnLeave">나가기</button>
  </div>
</div>
<div id="mpResult" class="mp-hidden">
  <div class="mp-card">
    <div class="mp-hint" id="mpResultSub" style="margin-bottom:12px;font-size:13px;font-weight:700;color:#3d2f6a;">🏆 최종 순위</div>
    <div class="mp-rl" id="mpRList"></div>
    <button class="mp-btn mp-btn-w" id="mpBtnReplay">처음으로</button>
  </div>
</div>
<div class="mp-hud" id="mpHud"></div>

<div class="top-hud">
  <div class="hud-side">
    <span class="hud-label">LEVEL</span>
    <span class="hud-value" id="level">1</span>
  </div>
  <div class="hud-side">
    <span class="hud-label">LIVES</span>
    <span class="hud-value" id="lives">3</span>
  </div>
  <div class="hud-side">
    <span class="hud-label">SCORE</span>
    <span class="hud-value" id="score">0</span>
  </div>
  <div class="hud-side">
    <span class="hud-label">BEST</span>
    <span class="hud-value hud-best" id="best">0</span>
  </div>
</div>

<div class="main-area">
  <div class="game-area">
    <canvas id="board"></canvas>
    <div class="overlay" id="overlay"></div>
  </div>
</div>

<div class="power-toast" id="powerToast"></div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const COLORS = ['#a8d8cb','#f2b5d4','#f7e1a1','#a8c8e8','#c5a8e0','#f4b8a8','#b5dbb5'];

const BOARD_W = 300;
const BOARD_H = 500;
const BRICK_COLS = 8;
const BRICK_ROWS = 6;
const BRICK_GAP = 3;
const PAD = 10;

// Brick types
const BRICK_COLORS = {
  hard: '#c9c0d4',     // silver pastel
  gold: '#e8d78a',     // gold pastel
  bomb: '#f4a89a',     // salmon pastel
};

// Power-up definitions
const POWERUPS = {
  L: { name:'LASER',     color:'#f4a8a8', desc:'LASER' },
  E: { name:'EXPAND',    color:'#a8e8b5', desc:'EXPAND' },
  C: { name:'CATCH',     color:'#a8c8e8', desc:'CATCH' },
  S: { name:'SLOW',      color:'#a8e8e8', desc:'SLOW' },
  D: { name:'DISRUPT',   color:'#c5a8e0', desc:'SPLIT' },
  M: { name:'MULTIBALL', color:'#f2b5d4', desc:'MULTI' },
  P: { name:'PLAYER',    color:'#ffe87a', desc:'1UP' },
  F: { name:'FIREBALL',  color:'#f4b580', desc:'FIRE' },
  G: { name:'MAGNET',    color:'#d8c5f0', desc:'MAGNET' },  // legacy
  T: { name:'THUNDER',   color:'#ffe87a', desc:'THUNDER' },
  K: { name:'CARRIER',   color:'#a0d4ff', desc:'CARRIER' },
  X: { name:'SHRINK',    color:'#8a8594', desc:'SHRINK', bad:true },
  H: { name:'HASTEN',    color:'#d0606c', desc:'FAST',   bad:true }
};
const GOOD_POWERUPS = ['L','E','C','S','D','M','P','F','T','K'];
const BAD_POWERUPS  = ['X','H'];

// ====== LEVEL THEMES ======
// Curated, sophisticated color palettes
const THEMES = [
  { // Level 1 - Dusty Pastel (muted, elegant)
    name: 'DUSK',
    bodyBg: '#1a1823',
    boardBg: '#242230',
    gridBg: 'softgrid',
    brickStyle: 'pastel',
    palette: ['#e8b9c4','#d4b3d4','#c4c8e0','#b3d4d4','#d9d4b0','#e8c4b3','#c8d9b9'],
    paddle: '#c4c8e0',
    ball: '#ede3d0',
    accent: '#d4b3d4',
  },
  { // Level 2 - Sage Garden (flat modern)
    name: 'SAGE',
    bodyBg: '#0e1612',
    boardBg: '#18221d',
    gridBg: 'softgrid',
    brickStyle: 'flat',
    palette: ['#9ab89a','#adc4a3','#88a88e','#c0d3ae','#8fb298','#aac4a0','#98b89c'],
    paddle: '#c0d3ae',
    ball: '#f0e8d0',
    accent: '#b5cfa0',
  },
  { // Level 3 - Macaron
    name: 'MACARON',
    bodyBg: '#221721',

  const availH = mainArea.clientHeight - 12;
  SCALE = Math.min(availW / BOARD_W, availH / BOARD_H);

  canvas.height = BOARD_H * SCALE;

  if (mpHudEl && mpActive) { mpHudEl.style.width = canvas.width + 'px'; }

function hexToRgb(hex) {
  if (!hex) return { r: 200, g: 200, b: 200 };
  // handle "rgb(r,g,b)" or "rgba(r,g,b,a)" format
  if (hex[0] === 'r') {
    const m = hex.match(/\d+/g);
    if (m) return { r: +m[0]||0, g: +m[1]||0, b: +m[2]||0 };
    return { r: 200, g: 200, b: 200 };
  }
  if (hex[0] !== '#' || hex.length < 7) return { r: 200, g: 200, b: 200 };
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {
    r: isNaN(r) ? 200 : r,
    g: isNaN(g) ? 200 : g,
    b: isNaN(b) ? 200 : b
  };
}

// darken a hex color by `amount` (0-255), returns hex string
function darkenHex(hex, amount) {
  const {r, g, b} = hexToRgb(hex);
  const dr = Math.max(0, r - amount);
  const dg = Math.max(0, g - amount);
  const db = Math.max(0, b - amount);
  return '#' + [dr,dg,db].map(c => c.toString(16).padStart(2,'0')).join('');
}

// ==== drawing helpers ====

// Draw a label over a brick (used by most styles)
function drawBrickLabel(x, y, w, h, label, darkText) {
  if (!label) return;
  ctx.save();
  const fontSize = Math.max(7, Math.floor(h * 0.7));
  ctx.font = `900 ${fontSize}px -apple-system, 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 2;
  ctx.strokeStyle = darkText ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.7)';
  ctx.strokeText(label, x + w/2, y + h/2 + 1);
  ctx.fillStyle = darkText ? '#222' : '#fff';
  ctx.fillText(label, x + w/2, y + h/2 + 1);
  ctx.restore();
}

// Rounded rect path helper
function roundedPath(x, y, w, h, rad) {
  ctx.beginPath();
  ctx.moveTo(x+rad, y);
  ctx.lineTo(x+w-rad, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+rad);
  ctx.lineTo(x+w, y+h-rad);
  ctx.quadraticCurveTo(x+w, y+h, x+w-rad, y+h);
  ctx.lineTo(x+rad, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-rad);
  ctx.lineTo(x, y+rad);
  ctx.quadraticCurveTo(x, y, x+rad, y);
  ctx.closePath();
}

// === Brick dispatcher ===
function drawBrick(x, y, w, h, color, alpha, label, styleOverride) {
  alpha = alpha == null ? 1 : alpha;
  const style = styleOverride || (currentTheme && currentTheme().brickStyle) || 'pastel';
  const theme = currentTheme ? currentTheme() : null;
  const darkText = theme && theme.darkText;
  switch (style) {
    case 'pastel':  drawBrick_pastel(x, y, w, h, color, alpha); break;
    case 'flat':    drawBrick_flat(x, y, w, h, color, alpha); break;
    case 'masonry': drawBrick_masonry(x, y, w, h, color, alpha); break;
    case 'candy':   drawBrick_candy(x, y, w, h, color, alpha); break;
    case 'neon':    drawBrick_neon(x, y, w, h, color, alpha); break;
    case 'crystal': drawBrick_crystal(x, y, w, h, color, alpha); break;
    case 'wood':    drawBrick_wood(x, y, w, h, color, alpha); break;
    case 'metal':   drawBrick_metal(x, y, w, h, color, alpha); break;
    case 'paper':   drawBrick_paper(x, y, w, h, color, alpha); break;
    case 'bubble':  drawBrick_bubble(x, y, w, h, color, alpha); break;
    case 'lava':    drawBrick_lava(x, y, w, h, color, alpha); break;
    default:        drawBrick_pastel(x, y, w, h, color, alpha);
  }
  drawBrickLabel(x, y, w, h, label, darkText);
}

// === Style 1: Pastel Dusk (refined, subtle gradient) ===
function drawBrick_pastel(x, y, w, h, color, alpha) {
  const rad = Math.max(2, Math.min(w, h) * 0.28);
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedPath(x, y, w, h, rad);
  ctx.clip();

  // soft vertical gradient
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, `rgba(${Math.min(255,r+25)},${Math.min(255,g+25)},${Math.min(255,b+25)},1)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-15)},${Math.max(0,g-15)},${Math.max(0,b-15)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // thin highlight line on top
  const shineGrad = ctx.createLinearGradient(x, y, x, y+h*0.4);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(x, y, w, h*0.4);

  // inner border
  ctx.globalAlpha = alpha * 0.35;
  ctx.strokeStyle = `rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},1)`;
  ctx.lineWidth = 0.5;
  roundedPath(x+0.5, y+0.5, w-1, h-1, rad);
  ctx.stroke();
  ctx.restore();
}

// === Style F: Flat Modern (clean, minimal, soft shadow) ===
function drawBrick_flat(x, y, w, h, color, alpha) {
  const rad = 4;
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;

  // soft drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  roundedPath(x+0.5, y+1.5, w, h, rad);
  ctx.fill();

  // flat body
  roundedPath(x, y, w, h, rad);
  ctx.fillStyle = color;
  ctx.fill();

  // very subtle top highlight line
  ctx.fillStyle = `rgba(255,255,255,0.18)`;
  ctx.fillRect(x + rad, y + 1, w - rad*2, 0.8);

  // subtle inner gradient overlay
  const innerGrad = ctx.createLinearGradient(x, y, x, y+h);
  innerGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
  innerGrad.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = innerGrad;
  roundedPath(x, y, w, h, rad);
  ctx.fill();

  ctx.restore();
}

// === Style 2: Masonry (real brick wall with mortar look) ===
function drawBrick_masonry(x, y, w, h, color, alpha) {
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;

  // slight mortar gap
  const mx = x + 1, my = y + 1, mw = w - 2, mh = h - 2;
  roundedPath(mx, my, mw, mh, 1.5);
  ctx.clip();

  // base color with vertical subtle gradient
  const grad = ctx.createLinearGradient(mx, my, mx, my+mh);
  grad.addColorStop(0, `rgba(${Math.min(255,r+25)},${Math.min(255,g+20)},${Math.min(255,b+15)},1)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-25)},${Math.max(0,g-25)},${Math.max(0,b-20)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(mx, my, mw, mh);

  // dark speckle texture
  const rng = ((x * 7919 + y * 31) | 0);
  ctx.fillStyle = `rgba(${Math.max(0,r-60)},${Math.max(0,g-50)},${Math.max(0,b-50)},0.4)`;
  for (let i = 0; i < 8; i++) {
    const sx = mx + ((rng + i*41) % 997 / 997) * mw;
    const sy = my + ((rng + i*73) % 991 / 991) * mh;
    ctx.fillRect(sx, sy, 1.2, 1.2);
  }
  // lighter flecks
  ctx.fillStyle = `rgba(${Math.min(255,r+50)},${Math.min(255,g+40)},${Math.min(255,b+30)},0.3)`;
  for (let i = 0; i < 5; i++) {
    const sx = mx + ((rng + i*53) % 983 / 983) * mw;
    const sy = my + ((rng + i*89) % 977 / 977) * mh;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // highlight edge (top)
  ctx.fillStyle = `rgba(255,230,200,0.25)`;
  ctx.fillRect(mx, my, mw, 1.5);
  // shadow edge (bottom)
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(mx, my+mh-1.5, mw, 1.5);

  ctx.restore();
}

// === Style 3: Macaron (soft matte with subtle shine) ===
function drawBrick_candy(x, y, w, h, color, alpha) {
  const rad = Math.min(w, h) * 0.42;
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedPath(x, y, w, h, rad);
  ctx.clip();

  // subtle vertical gradient
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, `rgba(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+30)},1)`);
  grad.addColorStop(0.6, color);
  grad.addColorStop(1, `rgba(${Math.max(0,r-25)},${Math.max(0,g-25)},${Math.max(0,b-25)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // refined top gloss (narrow band)
  const shineGrad = ctx.createLinearGradient(x, y, x, y+h*0.3);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(x+2, y+1, w-4, h*0.3);

  // soft inner rim
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.6;
  roundedPath(x+1.2, y+1.2, w-2.4, h-2.4, rad*0.85);
  ctx.stroke();
  ctx.restore();
}

// === Style 4: Synthwave Neon (sophisticated glow) ===
function drawBrick_neon(x, y, w, h, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const {r,g,b} = hexToRgb(color);

  // deep dark fill with subtle color tint
  const rad = 3;
  roundedPath(x+1, y+1, w-2, h-2, rad);
  const bgGrad = ctx.createLinearGradient(x, y, x, y+h);
  bgGrad.addColorStop(0, `rgba(${Math.floor(r*0.2)},${Math.floor(g*0.2)},${Math.floor(b*0.2)},0.95)`);
  bgGrad.addColorStop(1, `rgba(${Math.floor(r*0.08)},${Math.floor(g*0.08)},${Math.floor(b*0.08)},0.95)`);
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // outer glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 14;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  roundedPath(x+1, y+1, w-2, h-2, rad);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // inner bright line at top (horizon light)
  const lineGrad = ctx.createLinearGradient(x, y, x+w, y);
  lineGrad.addColorStop(0, 'rgba(255,255,255,0)');
  lineGrad.addColorStop(0.5, 'rgba(255,255,255,0.5)');
  lineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(x+3, y+3);
  ctx.lineTo(x+w-3, y+3);
  ctx.stroke();

  ctx.restore();
}

// === Style 5: Crystal (translucent with facets) ===
function drawBrick_crystal(x, y, w, h, color, alpha) {
  const rad = Math.min(w,h) * 0.15;
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha * 0.92;
  roundedPath(x, y, w, h, rad);
  ctx.clip();

  const grad = ctx.createLinearGradient(x, y, x+w, y+h);
  grad.addColorStop(0, `rgba(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)},0.85)`);
  grad.addColorStop(0.5, `rgba(${r},${g},${b},0.75)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},0.85)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // facet diagonal lines
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x+w*0.35, y+h);
  ctx.moveTo(x+w*0.7, y); ctx.lineTo(x+w, y+h*0.5);
  ctx.stroke();

  // top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(x+1, y+1, w-2, 2);

  // edge outline
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1;
  roundedPath(x+0.5, y+0.5, w-1, h-1, rad);
  ctx.stroke();
  ctx.restore();
}

// === Style 6: Wood (brown with grain) ===
function drawBrick_wood(x, y, w, h, color, alpha) {
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedPath(x, y, w, h, 2);
  ctx.clip();

  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, `rgba(${Math.min(255,r+30)},${Math.min(255,g+20)},${Math.min(255,b+10)},1)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-30)},${Math.max(0,g-25)},${Math.max(0,b-15)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // wood grain lines
  ctx.strokeStyle = `rgba(${Math.max(0,r-50)},${Math.max(0,g-40)},${Math.max(0,b-30)},0.35)`;
  ctx.lineWidth = 0.6;
  for (let i = 1; i < 4; i++) {
    const gy = y + h * (i / 4);
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.bezierCurveTo(x+w*0.3, gy-1, x+w*0.6, gy+1, x+w, gy);
    ctx.stroke();
  }
  // knot dot
  ctx.fillStyle = `rgba(${Math.max(0,r-60)},${Math.max(0,g-50)},${Math.max(0,b-35)},0.35)`;
  ctx.beginPath();
  ctx.ellipse(x+w*0.7, y+h*0.4, 1.2, 0.8, 0, 0, Math.PI*2);
  ctx.fill();

  // top/bottom edges
  ctx.fillStyle = 'rgba(255,230,200,0.2)';
  ctx.fillRect(x, y, w, 0.8);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x, y+h-0.8, w, 0.8);
  ctx.restore();
}

// === Style 7: Metal (cold gray with sharp edges) ===
function drawBrick_metal(x, y, w, h, color, alpha) {
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  // sharp rectangle, subtle chamfer
  ctx.beginPath();
  const bev = 1.5;
  ctx.moveTo(x+bev, y);
  ctx.lineTo(x+w-bev, y);
  ctx.lineTo(x+w, y+bev);
  ctx.lineTo(x+w, y+h-bev);
  ctx.lineTo(x+w-bev, y+h);
  ctx.lineTo(x+bev, y+h);
  ctx.lineTo(x, y+h-bev);
  ctx.lineTo(x, y+bev);
  ctx.closePath();
  ctx.clip();

  // metal gradient (light to dark)
  const grad = ctx.createLinearGradient(x, y, x, y+h);
  grad.addColorStop(0, `rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},1)`);
  grad.addColorStop(0.4, color);
  grad.addColorStop(0.5, `rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},1)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-60)},${Math.max(0,g-60)},${Math.max(0,b-60)},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // horizontal scanline
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(x, y+h*0.5);
  ctx.lineTo(x+w, y+h*0.5);
  ctx.stroke();

  // rivets in corners
  ctx.fillStyle = `rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)},1)`;
  [[x+3,y+3],[x+w-3,y+3],[x+3,y+h-3],[x+w-3,y+h-3]].forEach(([rx,ry]) => {
    ctx.beginPath();ctx.arc(rx,ry,0.8,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

// === Style 8: Paper (flat, soft shadow) ===
function drawBrick_paper(x, y, w, h, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // soft shadow below
  ctx.fillStyle = 'rgba(80,60,40,0.12)';
  roundedPath(x+1, y+1.5, w, h, 2);
  ctx.fill();

  // paper body
  roundedPath(x, y, w, h, 2);
  ctx.fillStyle = color;
  ctx.fill();

  // subtle fold line
  const {r,g,b} = hexToRgb(color);
  ctx.strokeStyle = `rgba(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)},0.25)`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(x, y+h*0.3);
  ctx.lineTo(x+w, y+h*0.3);
  ctx.stroke();
  ctx.restore();
}

// === Style 9: Bubble (translucent gloss) ===
function drawBrick_bubble(x, y, w, h, color, alpha) {
  const rad = Math.min(w, h) * 0.4;
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedPath(x, y, w, h, rad);
  ctx.clip();

  // translucent body
  const grad = ctx.createRadialGradient(x+w*0.35, y+h*0.3, 0, x+w*0.5, y+h*0.5, w*0.7);
  grad.addColorStop(0, `rgba(255,255,255,0.8)`);
  grad.addColorStop(0.3, `rgba(${r},${g},${b},0.9)`);
  grad.addColorStop(1, `rgba(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-30)},0.95)`);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // big highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.ellipse(x+w*0.3, y+h*0.25, w*0.3, h*0.18, -0.3, 0, Math.PI*2);
  ctx.fill();

  // small highlight
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(x+w*0.72, y+h*0.7, Math.min(w,h)*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// === Style 10: Lava (glowing with cracks) ===
function drawBrick_lava(x, y, w, h, color, alpha) {
  const {r,g,b} = hexToRgb(color);
  ctx.save();
  ctx.globalAlpha = alpha;
  roundedPath(x, y, w, h, 2);
  ctx.clip();

  // dark crust base
  ctx.fillStyle = `rgba(${Math.max(0,r-100)},${Math.max(0,g-80)},${Math.max(0,b-60)},1)`;
  ctx.fillRect(x, y, w, h);

  // glowing lava veins
  const t = performance.now() * 0.001;
  const pulse = 0.6 + Math.sin(t*3 + x*0.05)*0.4;
  const veinGrad = ctx.createRadialGradient(x+w*0.5, y+h*0.5, 0, x+w*0.5, y+h*0.5, w*0.7);
  veinGrad.addColorStop(0, `rgba(${Math.min(255,r+30)},${Math.min(255,g+20)},${b},${0.9*pulse})`);
  veinGrad.addColorStop(0.6, `rgba(${r},${Math.floor(g*0.7)},0,${0.5*pulse})`);
  veinGrad.addColorStop(1, `rgba(${Math.max(0,r-40)},0,0,0)`);
  ctx.fillStyle = veinGrad;
  ctx.fillRect(x, y, w, h);

  // glow shadow
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fillStyle = `rgba(${Math.min(255,r+50)},${Math.min(255,g+30)},0,${0.4*pulse})`;
  ctx.fillRect(x+w*0.4, y+h*0.4, w*0.2, h*0.2);
  ctx.shadowBlur = 0;

  // cracks (dark lines)
  ctx.strokeStyle = `rgba(0,0,0,0.7)`;
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(x, y+h*0.3);
  ctx.lineTo(x+w*0.5, y+h*0.5);
  ctx.lineTo(x+w, y+h*0.35);
  ctx.moveTo(x+w*0.3, y+h*0.8);
  ctx.lineTo(x+w*0.7, y+h*0.7);
  ctx.stroke();

  ctx.restore();
}

function drawBall(cx, cy, r, fire, ghost) {
  const theme = currentTheme();
  const tNow = performance.now() * 0.001;

  if (ghost) {
    // 고스트 모드: 반투명 파란빛, 깜빡이는 링
    const pulse = 0.45 + 0.35 * Math.sin(tNow * 10);
    ctx.save();
    // 외부 글로우
    const gg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r*2.8);
    gg.addColorStop(0, `rgba(100,200,255,${0.35*pulse})`);
    gg.addColorStop(1, 'rgba(100,200,255,0)');
    ctx.fillStyle = gg;
    ctx.fillRect(cx-r*2.8, cy-r*2.8, r*5.6, r*5.6);
    // 반투명 바디
    ctx.globalAlpha = 0.35 + 0.3 * pulse;
    ctx.fillStyle = '#80d0ff';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // 링 (에너지 링)
    ctx.globalAlpha = 0.7 + 0.3 * pulse;
    ctx.strokeStyle = '#c0eaff';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#60c0ff'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.95, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
    return;
  }

  const ballColor = fire ? '#ff8040' : theme.ball;
  const {r:cr, g:cg, b:cb} = hexToRgb(ballColor);
  ctx.save();

  // glow aura
  const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r*2.2);
  glowGrad.addColorStop(0, `rgba(${cr},${cg},${cb},0.5)`);
  glowGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
  ctx.fillStyle = glowGrad;
  ctx.fillRect(cx-r*2.2, cy-r*2.2, r*4.4, r*4.4);

  // body
  const bodyGrad = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
  bodyGrad.addColorStop(0, `rgba(${Math.min(255,cr+50)},${Math.min(255,cg+50)},${Math.min(255,cb+50)},1)`);
  bodyGrad.addColorStop(0.6, ballColor);
  bodyGrad.addColorStop(1, `rgba(${Math.max(0,cr-40)},${Math.max(0,cg-40)},${Math.max(0,cb-40)},1)`);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();ctx.arc(cx, cy, r, 0, Math.PI*2);ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();ctx.arc(cx-r*0.35, cy-r*0.35, r*0.25, 0, Math.PI*2);ctx.fill();
  ctx.restore();
}

// ==== game state ====

function currentBallSpeed() {
  // 레벨당 속도 증가량 완화 (0.18 → 0.09), cap 레벨 25
  const cappedLevel = Math.min(level, 25);
  const base = 3.2 + cappedLevel * 0.09;
  let mul = 1;
  if (paddleState.slow) mul *= 0.6;
  if (paddleState.fast) mul *= 1.5;
  return base * mul;
}

function applyBallSpeed(ball) {
  const speed = currentBallSpeed();
  const cur = Math.hypot(ball.vx, ball.vy) || 1;
  ball.vx = ball.vx / cur * speed;
  ball.vy = ball.vy / cur * speed;
}

function initBricks() {
  bricks = [];
  const totalW = BOARD_W - PAD*2;
  const bw = (totalW - BRICK_GAP*(BRICK_COLS-1)) / BRICK_COLS;
  const bh = 18;
  const startY = 50;

  const pattern = LEVEL_PATTERNS[(level - 1) % LEVEL_PATTERNS.length];

  for (let r=0; r<BRICK_ROWS; r++) {
    const row = pattern[r] || '';
    for (let c=0; c<BRICK_COLS; c++) {
      const ch = row[c] || '.';
      if (ch === '.' || ch === ' ') continue;

      const x = PAD + c*(bw+BRICK_GAP);
      const y = startY + r*(bh+BRICK_GAP);

      let type = 'normal';
      let hp = 1;
      const themePalette = currentTheme().palette;
      let color = themePalette[r % themePalette.length];
      let vx = 0;
      let powerUp = null;

      if (ch === 'H') {
        type = 'hard';
        hp = level >= 5 ? 3 : 2;
        color = BRICK_COLORS.hard;
      } else if (ch === 'G') {
        type = 'gold';
        hp = Infinity;
        color = BRICK_COLORS.gold;
      } else if (ch === 'B') {
        type = 'bomb';
        hp = 1;
        color = BRICK_COLORS.bomb;
      } else if (ch === 'M') {
        vx = Math.random() < 0.5 ? -0.5 : 0.5;
      }

      // moving bricks introduced from level 4 randomly
      if (level >= 4 && type === 'normal' && Math.random() < 0.1) {
        vx = Math.random() < 0.5 ? -0.5 : 0.5;
      }

      // power-up drops
      if (type !== 'gold' && Math.random() < 0.22) {
        if (Math.random() < 0.82) {
          powerUp = GOOD_POWERUPS[Math.floor(Math.random()*GOOD_POWERUPS.length)];
        } else {
          powerUp = BAD_POWERUPS[Math.floor(Math.random()*BAD_POWERUPS.length)];
        }
      }

      bricks.push({ x, y, w:bw, h:bh, color, type, hp, maxHp:hp, vx, powerUp, alive:true, mpKey:`${r}_${c}` });
    }
  }
}

function resetBallAndPaddle() {
  paddle = {
    w: 70, h: 12,
    x: BOARD_W/2 - 35,
    y: BOARD_H - 48,
    speed: 6,
    moveLeft: false, moveRight: false
  };
  paddleState = {
    expand: 0, shrink: 0, catch: 0, laser: 0,
    fire: 0, slow: 0, fast: 0, laserTransform: 0,
    carrier: 0, carrierTransform: 0
  };
  balls = [{
    x: BOARD_W/2,
    y: paddle.y - 10,
    r: 7,
    vx: 0, vy: 0,
    launched: false,
    stuck: true,
    bounceCount: 0,
    ghost: false
  }];
  powerUps = [];
  lasers = [];
  thunderBolts = [];
  shockwaves = [];
  screenShake = 0;
  interceptors = [];
  laserFireTimer = 0;
  updatePowerDisplay();
}

function reset() {
  score = 0;
  lives = 3;
  level = 1;
  gameOver = false; won = false; paused = false;
  levelTransition = null;
  particles = []; confetti = [];
  initBricks();
  resetBallAndPaddle();
  overlay.style.display = 'none';
  updateStats();
  document.getElementById('best').textContent = bestScore;
  applyTheme();
  resize();
}

function applyTheme() {
  const theme = currentTheme();
  document.body.style.background = theme.bodyBg;
}

function updateStats() {
  if (!mpActive) {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('breakout_best', bestScore); } catch(e) {}
    }
    document.getElementById('best').textContent = bestScore;
  }
  if (mpActive && mpRoomRef) {
    mpRoomRef.child(`players/${mpMyPid}/score`).set(score);
    mpRoomRef.child(`players/${mpMyPid}/lives`).set(lives);
    mpRenderHud();
  }
}

function showPowerToast(type) {
  const def = POWERUPS[type];
  const toast = document.getElementById('powerToast');
  const icon = def.bad ? '⚠' : '✦';
  toast.textContent = `${icon} ${def.desc}`;
  toast.style.background = def.color;
  toast.style.color = def.bad ? '#fff' : '#1a1626';
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1800);
}

function updatePowerDisplay() {
  // legacy stub – toast handles display now
}

function launchBall() {
  if (gameOver || won || levelTransition) return;
  if (paddleState.carrier > 0) return;
  if (mpActive && mpCountdown > 0) return; // 카운트다운 중 발사 차단
  for (const ball of balls) {
    if (ball.stuck) {
      const speed = currentBallSpeed();
      const angle = -Math.PI/2 + (Math.random()-0.5) * 0.5;
      ball.vx = Math.cos(angle) * speed;
      ball.vy = Math.sin(angle) * speed;
      ball.launched = true;
      ball.stuck = false;
      ball.stickOffset = 0;
    }
  }
  // also fire laser if equipped
  if (paddleState.laser > 0) {
    lasers.push({ x: paddle.x + 6, y: paddle.y, vy: -8 });
    lasers.push({ x: paddle.x + paddle.w - 6, y: paddle.y, vy: -8 });
  }
}

function loseLife() {
  sfxPlay('life_lost');
  lives--;
  updateStats();
  if (mpActive && mpRoomRef) {
    mpRoomRef.child(`players/${mpMyPid}/lives`).set(lives);
    if (lives <= 0) {
      mpRoomRef.child(`players/${mpMyPid}/alive`).set(false);
      gameOver = true;
      mpShowOutOverlay();
    } else {
      resetBallAndPaddle();
    }
    return;
  }
  if (lives <= 0) {
    gameOver = true;
    savedBricks = bricks.map(b => ({ ...b }));
    showOverlay(
      `GAME OVER\n<div class="sub">Score: ${score} · Level ${level}</div>` +
      `\n<button class="btn" id="continueBtn">CONTINUE</button>` +
      `\n<button class="btn btn-sub" id="restartBtn">RESTART</button>`
    );
  } else {
    resetBallAndPaddle();
  }
}

function continueGame() {
  // 저장된 벽돌 상태 복원 (이어하기 = 사망 직전 상태 그대로)
  if (savedBricks) {
    bricks = savedBricks.map(b => ({ ...b }));
  }
  lives = 3;
  gameOver = false; won = false; paused = false;
  levelTransition = null;
  particles = []; confetti = [];
  resetBallAndPaddle();
  overlay.style.display = 'none';
  updateStats();
  applyTheme();
  resize();
}

function nextLevel() {
  level++;
  updateStats();
  initBricks();
  resetBallAndPaddle();
  applyTheme();
  if (mpActive && mpIsHost && mpRoomRef) {
    const bd = {};
    bricks.forEach(b => { bd[b.mpKey] = mpBrickType(b.type); });
    mpRoomRef.update({ level: level, bricks: bd });
  }
}

function showOverlay(html) {
  overlay.innerHTML = html;
  overlay.style.display = 'block';
  const btn = document.getElementById('restartBtn');
  if (btn) {
    btn.addEventListener('click', e => { e.stopPropagation(); reset(); });
    btn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); reset(); });
  }
  const cBtn = document.getElementById('continueBtn');
  if (cBtn) {
    cBtn.addEventListener('click', e => { e.stopPropagation(); continueGame(); });
    cBtn.addEventListener('touchend', e => { e.preventDefault(); e.stopPropagation(); continueGame(); });
  }
}

// Basic generic spawner (for powerups, catches, etc.)
function spawnParticles(x, y, color, count) {
  for (let i=0;i<count;i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 1 + Math.random()*3;
    particles.push({
      x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - 1,
      life:0.5+Math.random()*0.5, age:0, size:2+Math.random()*3,
      color, spin:(Math.random()-0.5)*6, gravity: 0.15,
      type: Math.random()<0.5?'star':'heart'
    });
  }
}

// Brick break effects (one per level, 1~10)
function spawnBrickBreak(x, y, color, lvl) {
  const effectId = ((lvl - 1) % 10) + 1;
  switch (effectId) {
    case 1:  return fxStars(x, y, color);
    case 2:  return fxHearts(x, y, color);
    case 3:  return fxConfetti(x, y, color);
    case 4:  return fxBubbles(x, y, color);
    case 5:  return fxRainbow(x, y, color);
    case 6:  return fxPetals(x, y, color);
    case 7:  return fxLightning(x, y, color);
    case 8:  return fxIceShards(x, y, color);
    case 9:  return fxMusicNotes(x, y, color);
    case 10: return fxFireworks(x, y, color);
  }
}
